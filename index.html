<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الدعاء · الرقية الشرعية · الأذكار</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #cc0000;
            --accent-soft: rgba(204,0,0,0.15);
            --widget-bg: #ffffff;
            --header-bg: #cc0000;
            --text: #1a1a1a;
            --text-dim: #666666;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --popup-bg: #ffffff;
            --popup-border: #ddd;
            --shadow: 0 8px 20px rgba(0,0,0,0.05);
            --dua-font-size: 22px;
            --envelope-flap: #d0d0d0;
            --heart-stroke-light: #333333;
            --heart-stroke-dark: #ffffff;
            /* Added for the grey source box */
            --source-bg: #f4f4f4;
            --source-text: #555555;
        }

        body.dark-mode {
            --widget-bg: #1e1e2f;
            --header-bg: #2d2d44;
            --text: #ffffff;
            --text-dim: #aaaaaa;
            --card-bg: #2a2a3a;
            --border-color: #3a3a4a;
            --popup-bg: #2a2a3a;
            --popup-border: #444;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
            --envelope-flap: #555555;
            --source-bg: #323246;
            --source-text: #cccccc;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease;
            font-family: 'Tajawal', 'Inter', sans-serif;
        }
        /* Floating icon animation from Azkar widget */

        /* English text uses Inter font */
        .dua-translation, .message-card p, .message-card .sub-title, .grid-item span, .menu-section-title span:last-child, .setting-label span:last-child, .setting-row, .share-popup-title, .empty-fav {
            font-family: 'Inter', sans-serif;
        }
        /* Arabic text uses Tajawal/Amiri */
        .dua-arabic, .dua-transliteration, .message-card h2, .message-card .open-link, .dua-number, .subcategory-btn, .back-button, .tab span, .tab label {
            font-family: 'Amiri', 'Tajawal', serif;
        }
        body.dark-mode { background-color: #12121a; }

        /* Text direction classes */
        body.text-rtl .message-card, body.text-rtl .dua-card { direction: rtl; text-align: right; }
        body.text-ltr .message-card, body.text-ltr .dua-card { direction: ltr; text-align: left; }

        /* Menu section title alignment - FIXED for Arabic */
        body.text-rtl .menu-popover .menu-section-title { text-align: left; justify-content: flex-start; direction: ltr; }
        body.text-ltr .menu-popover .menu-section-title { text-align: left; justify-content: flex-start; }

        .grid-item { text-align: center !important; }
        .message-card { text-align: center !important; }

        /* FIXED: Swap heart/number positions based on language */
        body.text-rtl .dua-header { flex-direction: row-reverse; }
        body.text-ltr .dua-header { flex-direction: row; }

        /* FIXED: Heart color in light mode */
        body:not(.dark-mode) .fav-btn-small svg path { stroke: var(--heart-stroke-light) !important; }
        body.dark-mode .fav-btn-small svg path { stroke: var(--heart-stroke-dark) !important; }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--widget-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        header {
            background-color: var(--header-bg);
            padding: 14px 18px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            direction: ltr !important;
        }
        .header-icons {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-left: auto;
            flex-direction: row;
            direction: ltr !important;
        }
        .icon-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .icon-btn img { width: auto; height: auto; max-width: 24px; max-height: 24px; filter: invert(1); display: block; }
        .lang-btn img { max-width: 28px; max-height: 28px; }
        .menu-icon span { font-size: 26px; font-weight: bold; color: white; line-height: 1; }

        /* FLOATING ICON ANIMATION */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .floating-icon {
            width: 50px;
            height: 50px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.2s;
        }
        .floating-icon:hover {
            transform: scale(1.1);
        }
        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ENVELOPE with CLEAN V-SHAPE - FIXED */
        .message-container { padding: 25px 20px; perspective: 1000px; }
        .message-card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 60px 20px 35px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            animation: mailSwing 1.2s ease-out forwards;
        }
        .message-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: var(--envelope-flap);
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 2;
        }
        @keyframes mailSwing {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(12deg); }
            30% { transform: rotate(-10deg); }
            45% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            75% { transform: rotate(3deg); }
            90% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }
        .message-card h2 { font-size: 1.6rem; margin-bottom: 4px; color: var(--text); font-weight: 800; }
        .message-card .sub-title { color: var(--text-dim); font-size: 1rem; margin-bottom: 15px; }
        .message-card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6; }
        .message-card .open-link { color: var(--accent); font-weight: 800; font-size: 1.1rem; text-decoration: none; }

        /* GRID */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 20px 40px 20px;
            direction: ltr !important;
        }
        .grid-container.grid-3cols { grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .grid-item {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 24px 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            box-shadow: var(--shadow);
            color: var(--text);
        }
        .grid-item:active { transform: scale(0.96); }
        .grid-item.active {
            background: var(--accent) !important;
            border: none;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            transform: scale(1.02);
        }
        .grid-item.active span { color: white; }
        .grid-item.active img { filter: none !important; }
        .grid-item img { width: 70px; height: 70px; margin-bottom: 12px; object-fit: contain; }
        .grid-item span { font-weight: 700; font-size: 1rem; color: var(--text); }

        /* RUQYAH & FAVORITES Views */
        .ruqyah-view, .favorites-view {
            display: none;
            flex-direction: column;
            padding: 0 20px 20px 20px;
        }
        .subcategory-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0 15px 0;
        }
        .subcategory-btn {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text);
            transition: 0.2s;
        }
        .subcategory-btn.active { background: var(--accent); color: white; }
        .back-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }
        .dua-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        .dua-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border-left: 4px solid var(--accent);
            box-shadow: var(--shadow);
            transition: 0.2s;
            position: relative;
        }
        /* FIXED: Highlight selected dua */
        .dua-card.selected {
            background: var(--accent-soft);
            transform: scale(0.98);
            transition: 0.1s;
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 12px rgba(204,0,0,0.2);
        }
        .dua-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .dua-number {
            font-weight: bold;
            color: var(--accent);
            font-size: 0.9rem;
        }
        .fav-btn-small {
            background: none;
            border: none;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .fav-btn-small:hover { transform: scale(1.15); }
        .fav-btn-small svg { width: 22px; height: 22px; }

        /* FIXED: Heart fill color */
        .fav-btn-small svg path[fill="#ff4444"] { fill: #ff4444 !important; }

        .dua-arabic { 
            font-size: var(--dua-font-size); 
            font-family: 'Amiri', serif; 
            line-height: 1.6; 
            margin-bottom: 8px; 
            transition: all 0.3s ease;
        }
        .dua-translation { 
            font-size: calc(var(--dua-font-size) * 0.75); 
            margin-bottom: 6px; 
            line-height: 1.5;
            transition: all 0.3s ease;
        }
        .dua-transliteration { 
            font-size: calc(var(--dua-font-size) * 0.7); 
            font-style: italic; 
            border-top: 1px dashed var(--border-color); 
            padding-top: 6px; 
            margin-top: 4px; 
            transition: all 0.3s ease;
        }

        /* Grey Box for Source/Tafsir */
        .dua-source-box {
            background: var(--source-bg);
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--source-text);
            text-align: right;
            border-right: 4px solid #888;
            line-height: 1.5;
            display: none;
        }

        /* FIXED: Language priority styling */
        /* Main language - bold and colored */
        .dua-main-lang { font-weight: 700; }
        /* Secondary language - grey */
        .dua-secondary-lang { font-weight: 400; color: var(--text-dim) !important; }
        /* Transliteration always grey */
        .dua-transliteration { color: var(--text-dim) !important; }

        /* Light mode: main text black, secondary grey */
        body:not(.dark-mode) .dua-main-lang { color: #1a1a1a !important; }
        body:not(.dark-mode) .dua-secondary-lang { color: #666666 !important; }

        /* Dark mode: main text accent color, secondary grey */
        body.dark-mode .dua-main-lang { color: var(--accent) !important; }
        body.dark-mode .dua-secondary-lang { color: var(--text-dim) !important; }

        /* MENU POPOVER - FIXED for Arabic alignment */
        .menu-popover {
            position: fixed; 
            top: 70px; 
            right: 18px; 
            background: var(--popup-bg); 
            padding: 18px;
            border-radius: 20px; 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.15s; 
            z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            border: 1px solid var(--popup-border); 
            width: 290px; 
            direction: ltr;
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        .menu-header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
        }
        /* FIXED: Menu section title always left-aligned */
        .menu-section-title { 
            color: var(--text); 
            font-size: 14px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            text-align: left;
            justify-content: flex-start;
        }
        .theme-toggle { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(128,128,128,0.15); 
            border-radius: 30px; 
            padding: 4px; 
        }
        .theme-toggle-icon { 
            font-size: 18px; 
            width: 28px; 
            text-align: center; 
            cursor: pointer; 
            opacity: 0.6; 
            color: var(--text); 
        }
        .theme-toggle-icon.active { opacity: 1; filter: drop-shadow(0 0 2px var(--accent)); }
        .theme-switch { 
            position: relative; 
            display: inline-block; 
            width: 52px; 
            height: 26px; 
        }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-color: #ccc; 
            transition: 0.2s; 
            border-radius: 26px; 
        }
        .theme-slider:before { 
            position: absolute; 
            content: ""; 
            height: 22px; 
            width: 22px; 
            left: 2px; 
            bottom: 2px; 
            background-color: white; 
            transition: 0.2s; 
            border-radius: 50%; 
        }
        input:checked + .theme-slider { background-color: var(--accent); }
        input:checked + .theme-slider:before { transform: translateX(26px); }
        .menu-divider { 
            height: 1px; 
            background: var(--text-dim); 
            margin: 12px 0; 
            border: none; 
            opacity: 0.3; 
        }
        .color-menu { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .color-dot { 
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid transparent; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.1s; 
        }
        .color-dot.active { border-color: var(--text); transform: scale(1.08); }
        .color-dot.active::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .settings-rows { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .setting-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: var(--text); 
            font-size: 13px; 
            font-weight: 600; 
        }
        .setting-label { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .font-slider { 
            width: 100px; 
            accent-color: var(--accent); 
            cursor: pointer; 
        }
        .action-btns { 
            display: flex; 
            gap: 10px; 
            margin-top: 10px; 
            padding-top: 10px; 
            border-top: 1px solid var(--text-dim); 
        }
        .action-btn { 
            flex: 1; 
            height: 42px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            background: var(--accent); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
            position: relative; 
        }
        .action-btn svg { width: 20px; height: 20px; fill: white; }
        .action-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .action-btn::after { 
            content: attr(data-tooltip); 
            position: absolute; 
            bottom: 50px; 
            background: #333; 
            color: white; 
            font-size: 11px; 
            padding: 4px 10px; 
            border-radius: 6px; 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.15s; 
            white-space: nowrap; 
            pointer-events: none; 
        }
        .action-btn:hover::after { visibility: visible; opacity: 1; }
        .switch { 
            position: relative; 
            display: inline-block; 
            width: 44px; 
            height: 24px; 
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-color: #555; 
            transition: .15s; 
            border-radius: 24px; 
        }
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 18px; 
            width: 18px; 
            left: 3px; 
            bottom: 3px; 
            background-color: #ddd; 
            transition: .15s; 
            border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        /* FIXED: Share popup from Azkar widget */
        .share-popup {
            position: fixed; 
            bottom: 100px; 
            right: 20px; 
            background: var(--popup-bg); 
            border-radius: 28px;
            padding: 20px; 
            width: 300px; 
            z-index: 1100; 
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid var(--accent); 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.15s ease; 
            transform: scale(0.95);
        }
        .share-popup.show { 
            visibility: visible; 
            opacity: 1; 
            transform: scale(1); 
        }
        .share-popup-title { 
            text-align: center; 
            font-weight: 700; 
            font-size: 18px; 
            margin-bottom: 18px; 
            color: var(--accent); 
        }
        .share-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 18px;
            justify-items: center;
        }
        .share-icon {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px;
            cursor: pointer; 
            color: var(--accent); 
            font-size: 12px; 
            font-weight: 500;
            transition: transform 0.1s ease;
        }
        .share-icon:hover { transform: scale(1.05); }
        .share-icon svg {
            width: 48px; 
            height: 48px;
            background: rgba(128,128,128,0.2); 
            border-radius: 30px;
            padding: 10px;
            transition: background 0.2s;
            stroke: var(--accent);
        }
        .share-icon:hover svg { background: rgba(128,128,128,0.4); }

        #duaModal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); 
            z-index: 1000;
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .modal-content { 
            background: var(--card-bg); 
            padding: 40px 25px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            color: var(--text); 
            max-height: 85vh;
            overflow-y: auto;
        }
        .dua-text { 
            font-size: var(--dua-font-size); 
            line-height: 1.8; 
            margin-bottom: 30px; 
            font-family: 'Amiri', serif; 
        }
        .close-modal { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .empty-fav { 
            opacity: 0.8; 
            font-style: italic; 
            text-align: center; 
            padding: 30px; 
            color: var(--text-dim); 
        }

        @media (max-width: 480px) {
            .grid-container.grid-3cols { grid-template-columns: repeat(2, 1fr); }
            .grid-item span { font-size: 0.85rem; }
        }
    </style>

<body class="text-rtl">
<div class="app-container">
    <header>
        <div class="header-icons" style="width:100%; justify-content:space-between; align-items:center;">
            <button class="icon-btn lang-btn" id="langToggleBtn"><img src="https://cdn-icons-png.flaticon.com/128/4570/4570372.png" alt="language"></button>
            <div class="header-center" style="position:absolute; left:50%; transform:translateX(-50%);">
                <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/13773/13773984.png" onclick="changeIcon()" alt="Icon" style="width:50px; height:50px; cursor:pointer; animation:float 3s ease-in-out infinite;">
            </div>
            <button class="icon-btn menu-icon" id="menuToggleBtn"><span>☰</span></button>
        </div>
    </header>

    <div class="message-container" id="messageContainer">
        <div class="message-card" id="dailyMessageCard">
            <h2 id="msgTitle">رسالتك اليوم</h2>
            <div class="sub-title" id="msgSub">رسالتك اليوم</div>
            <p id="msgText">قد يكون وراء هذا الدعاء رسالة كُتبت لك وأنت اليوم أشد ما تحتاجها</p>
            <div class="open-link" id="msgLink">اضغط هنا لتفتحها</div>
        </div>
    </div>

    <div class="grid-container" id="gridContainer">
        <div class="grid-item" data-category="ruqya"><img src="https://cdn-icons-png.flaticon.com/128/7246/7246452.png" alt="ruqya"><span id="labelRuqya">الرقية الشرعية</span></div>

<script>
// ==================== COMPLETE DATA ARRAYS ====================

const sunnahDuas = [
    { ar: "اللَّهُمَّ لَكَ الْحَمْدُ أَنْتَ قَيِّمُ السَّمَاوَاتِ وَالْأَرْضِ وَمَنْ فِيهِنَّ، وَلَكَ الْحَمْدُ لَكَ مُلْكُ السَّمَاوَاتِ وَالْأَرْضِ وَمَنْ فِيهِنَّ، وَلَكَ الْحَمْدُ أَنْتَ نُورُ السَّمَاوَاتِ وَالْأَرْضِ وَمَنْ فِيهِنَّ، وَلَكَ الْحَمْدُ أَنْتَ مَلِكُ السَّمَاوَاتِ وَالْأَرْضِ، وَلَكَ الْحَمْدُ أَنْتَ الْحَقُّ وَوَعْدُكَ الْحَقُّ، وَلِقَاؤُكَ حَقٌّ، وَقَوْلُكَ حَقٌّ، وَالْجَنَّةُ حَقٌّ، وَالنَّارُ حَقٌّ، وَالنَّبِيُّونَ حَقٌّ، وَمُحَمَّدٌ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ حَقٌّ، وَالسَّاعَةُ حَقٌّ، اللَّهُمَّ لَكَ أَسْلَمْتُ، وَبِكَ آمَنْتُ، وَعَلَيْكَ تَوَكَّلْتُ، وَإِلَيْكَ أَنَبْتُ، وَبِكَ خَاصَمْتُ، وَإِلَيْكَ حَاكَمْتُ، فَاغْفِرْ لِي مَا قَدَّمْتُ وَمَا أَخَّرْتُ، وَمَا أَسْرَرْتُ وَمَا أَعْلَنْتُ، أَنْتَ الْمُقَدِّمُ، وَأَنْتَ الْمُؤَخِّرُ، لَا إِلَهَ إِلَّا أَنْتَ.", en: "O Allah, for You is all praise – You are the Sustainer of the heavens and the earth and whoever is in them. And for You is all praise – Yours is the kingdom of the heavens and the earth and whoever is in them. And for You is all praise – You are the Light of the heavens and the earth and whoever is in them. And for You is all praise – You are the King of the heavens and the earth. And for You is all praise – You are the Truth, Your promise is true, meeting You is true, Your Word is true, Paradise is true, Hellfire is true, the prophets are true, Muhammad (peace and blessings be upon him) is true, and the Hour is true. O Allah, to You I have submitted, in You I have believed, upon You I have relied, to You I have turned in repentance, by You I have argued, and to You I have turned for judgment. So forgive me what I have sent forth and what I have delayed, what I have concealed and what I have declared. You are the One Who brings forward, and You are the One Who puts back. There is no deity except You.", translit: "Allāhumma laka l-ḥamdu anta qayyimu s-samāwāti wa l-arḍi wa man fīhinna, wa laka l-ḥamdu laka mulku s-samāwāti wa l-arḍi wa man fīhinna, wa laka l-ḥamdu anta nūru s-samāwāti wa l-arḍi wa man fīhinna, wa laka l-ḥamdu anta maliku s-samāwāti wa l-arḍ, wa laka l-ḥamdu anta l-ḥaqqu wa wa‘duka l-ḥaqq, wa liqā’uka ḥaqq, wa qawluka ḥaqq, wa l-jannatu ḥaqq, wa n-nāru ḥaqq, wa n-nabiyyūna ḥaqq, wa Muḥammadun ṣallallāhu ‘alayhi wa sallama ḥaqq, wa s-sā‘atu ḥaqq. Allāhumma laka aslamtu, wa bika āmantu, wa ‘alayka tawakkaltu, wa ilayka anabtu, wa bika khāṣamtu, wa ilayka ḥākamtu, faghfir lī mā qaddamtu wa mā akhkhartu, wa mā asrartu wa mā a‘lantu, anta l-muqaddimu wa anta l-mu’akhkhiru, lā ilāha illā anta.", source: "Ṣaḥīḥ al-Bukhārī (1120).", tafsir: "“Qayyimu s-samāwāti wa l-arḍi wa man fīhinna” = He Who constantly manages the creation, giving them what sustains their affairs. “Anta l-muqaddimu wa anta l-mu’akhkhiru” = You advance whom You will of Your creation to Your mercy by Your guidance, and You delay whom You will by Your abandonment." },
    { ar: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ لَكَ بِذَنْبِي فَاغْفِرْ لِي، فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ.", en: "O Allah, You are my Lord, there is no deity except You. You created me and I am Your servant. I am faithful to Your covenant and Your promise as much as I am able. I seek refuge in You from the evil of what I have done. I acknowledge before You Your favor upon me, and I acknowledge my sin to You, so forgive me, for indeed none forgives sins except You.", translit: "Allāhumma anta rabbī lā ilāha illā anta, khalaqtanī wa anā ‘abduka, wa anā ‘alā ‘ahdika wa wa‘dika mā staṭa‘tu, a‘ūdhu bika min sharri mā ṣana‘tu, abū’u laka bi-ni‘matika ‘alayya, wa abū’u laka bi-dhanbī faghfir lī, fa-innahu lā yaghfiru dh-dhunūba illā anta.", source: "Ṣaḥīḥ al-Bukhārī (6306).", tafsir: "“Abū’u laka” = I confess and acknowledge to You." },
    { ar: "اللَّهُمَّ مَالِكَ الْمُلْكِ، تُؤْتِي الْمُلْكَ مَنْ تَشَاءُ، وَتَنْزِعُ الْمُلْكَ مِمَّنْ تَشَاءُ، وَتُعِزُّ مَنْ تَشَاءُ، وَتُذِلُّ مَنْ تَشَاءُ، بِيَدِكَ الْخَيْرُ إِنَّكَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَحْمَانُ الدُّنْيَا وَالْآخِرَةِ، تُعْطِيهِمَا مَنْ تَشَاءُ، وَتَمْنَعُ مِنْهُمَا مَنْ تَشَاءُ، ارْْحَمْنِي رَحْمَةً تُغْنِينِي بِهَا عَنْ رَحْمَةِ مَنْ سِوَاكَ.", en: "O Allah, Owner of all sovereignty, You give sovereignty to whom You will, and You take sovereignty away from whom You will. You honor whom You will, and You humiliate whom You will. In Your hand is all good. Indeed, You are over all things competent. Most Merciful of this world and the Hereafter, You give them to whom You will and You withhold them from whom You will. Have mercy on me with a mercy that makes me independent of the mercy of anyone other than You.", translit: "Allāhumma mālika l-mulki, tu’ti l-mulka man tashā’u wa tanzi‘u l-mulka mimman tashā’u, wa tu‘izzu man tashā’u wa tudhillu man tashā’u, biyadika l-khayr, innaka ‘alā kulli shay’in qadīr. Raḥmānu d-dunyā wa l-ākhirah, tu‘ṭīhimā man tashā’u wa tamna‘u minhumā man tashā’u, irḥamnī raḥmatan tughnِينِي bihā ‘an raḥmati man siwāk.", source: "Al-Mu‘jam aṣ-Ṣaghīr li-ṭ-Ṭabarānī (558). Al-Albānī said: Ḥasan." },
    { ar: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، وَاحْفَظْنِي مِنْ بَيْنِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي.", en: "O Allah, I ask You for forgiveness and well-being in this world and the Hereafter. O Allah, I ask You for forgiveness and well-being in my religion, my worldly affairs, my family, and my wealth. O Allah, conceal my faults, calm my fears, protect me from before me, from behind me, from my right, from my left, and from above me. And I seek refuge in Your greatness from being destroyed from beneath me.", translit: "Allāhumma innī as’aluka l-‘afwa wa l-‘āfiyata fī d-dunyā wa l-ākhirah. Allāhumma innī as’aluka l-‘afwa wa l-‘āfiyata fī dīnī wa dunyāya wa ahlī wa mālī. Allāhumma stur ‘awrātī, wa āmin raw‘ātī, waḥfaẓnī min bayni yadayya wa min khalfī wa ‘an yamīnī wa ‘an shimālī wa min fawqī, wa a‘ūdhu bi ‘aẓamatika an ughtāla min taḥtī.", source: "Sunan Ibn Mājah (3871). Authenticated by Al-Albānī.", tafsir: "“Ughtāla” = i.e., being swallowed by the earth (cave-in)." },
    { ar: "اللَّهُمَّ لَكَ أَسْلَمْتُ، وَبِكَ آمَنْتُ، وَعَلَيْكَ تَوَكَّلْتُ، وَإِلَيْكَ أَنَبْتُ، وَبِكَ خَاصَمْتُ، اللَّهُمَّ إِنِّي أَعُوذُ بِعِزَّتِكَ، لَا إِلَهَ إِلَّا أَنْتَ، أَنْ تُضِلَّنِي، أَنْتَ الْحَيُّ الَّذِي لَا يَمُوتُ، وَالْجِنُّ وَالْإِنْسُ يَمُوتُونَ.", en: "O Allah, to You I have submitted, in You I have believed, upon You I have relied, to You I have turned in repentance, and by You I have argued. O Allah, I seek refuge in Your might – there is no deity except You – from that You cause me to go astray. You are the Ever-Living Who never dies, while jinn and mankind die.", translit: "Allāhumma laka aslamtu, wa bika āmantu, wa ‘alayka tawakkaltu, wa ilayka anabtu, wa bika khāṣamtu. Allāhumma innī a‘ūdhu bi-‘izzatika, lā ilāha illā anta, an tuḍillanī. Anta l-ḥayyu lladhī lā yamūtu, wa l-jinnu wa l-insu yamūtūn.", source: "Ṣaḥīḥ Muslim (2717)." },
    { ar: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْهُدَى وَالتُّقَى، وَالْعَفَافَ وَالْغِنَى.", en: "O Allah, I ask You for guidance, piety, chastity, and self-sufficiency.", translit: "Allāhumma innī as’aluka l-hudā wa t-tuqā, wa l-‘afāfa wa l-ghinā.", source: "Ṣaḥīḥ Muslim (2721)." },
    { ar: "يَا مُقَلِّبَ الْقُلُوبِ ثَبِّتْ قَلْبِي عَلَى دِينِكَ.", en: "O Turner of hearts, make my heart firm upon Your religion.", translit: "Yā muqalliba l-qulūbi thabbit qalbī ‘alā dīnik.", source: "Sunan at-Tirmidhī (3522). Authenticated by Al-Albānī." },
    { ar: "اللَّهُمَّ جَنِّبْنِي مُنْكَرَاتِ الْأَخْلَاقِ، وَالْأَهْوَاءِ، وَالْأَعْمَالِ وَالْأَدْوَاءِ.", en: "O Allah, keep me away from evil manners, evil desires, evil deeds, and evil diseases.", translit: "Allāhumma jannibnī munkarāti l-akhlāqi, wa l-ahwā’i, wa l-a‘māli wa l-adwā’.", source: "Al-Mustadrak ‘alā aṣ-Ṣaḥīḥayn lil-Ḥākim (1949).", tafsir: "“Al-adwā’” = plural of dā’ (disease), repulsive illnesses such as leprosy, vitiligo." },
    { ar: "اللَّهُمَّ أَصْلِحْ لِي دِينِي الَّذِي هُوَ عِصْمَةُ أَمْرِي، وَأَصْلِحْ لِي دُنْيَايَ الَّتِي فِيهَا مَعَاشِي، وَأَصْلِحْ لِي آخِرَتِي الَّتِي فِيهَا مَعَادِي، وَاجْعَلِ الْحَيَاةَ زِيَادَةً لِي فِي كُلِّ خَيْرٍ، وَاجْعَلِ الْمَوْتَ رَاحَةً لِي مِنْ كُلِّ شَرٍّ.", en: "O Allah, set right for me my religion which is the safeguard of my affairs; set right for me my worldly life in which is my livelihood; set right for me my Hereafter to which is my return; make life an increase for me in every good; and make death a relief for me from every evil.", translit: "Allāhumma aṣliḥ lī dīnī alladhī huwa ‘iṣmatu amrī, wa aṣliḥ lī dunyāya allatī fīhā ma‘āshī, wa aṣliḥ lī ākhiratī allatī fīhā ma‘ādī, waj‘ali l-ḥayāta ziyādatan lī fī kulli khayr, waj‘ali l-mawta rāḥatan lī min kulli sharr.", source: "Ṣaḥīḥ Muslim (2720)." },
    { ar: "اللَّهُمَّ اغْفِرْ لِي خَطِيئَتِي وَجَهْلِي، وَإِسْرَافِي فِي أَمْرِي، وَمَا أَنْتَ أَعْلَمُ بِهِ مِنِّي، اللَّهُمَّ اغْفِرْ لِي جِدِّي وَهَزْلِي، وَخَطَئِي وَعَمْدِي، وَكُلُّ ذَلِكَ عِنْدِي، اللَّهُمَّ اغْفِرْ لِي مَا قَدَّمْتُ وَمَا أَخَّرْتُ، وَمَا أَسْرَرْتُ وَمَا أَعْلَنْتُ، وَمَا أَنْتَ أَعْلَمُ بِهِ مِنِّي، أَنْتَ الْمُقَدِّمُ وَأَنْتَ الْمُؤَخِّرُ، وَأَنْتَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", en: "O Allah, forgive me my sin, my ignorance, my excess in my affairs, and what You know better than I. O Allah, forgive me my seriousness and my jest, my error and my intent, and all of that is from me. O Allah, forgive me what I have sent forth and what I have delayed, what I have concealed and what I have declared, and what You know better than I. You are the One Who brings forward, and You are the One Who puts back, and You are over all things competent.", translit: "Allāhumma ghfir lī khaṭī’atī wa jahlī, wa isrāfī fī amrī, wa mā anta a‘lamu bihī minnī. Allāhumma ghfir lī jiddī wa hazlī, wa khaṭa’ī wa ‘amdī, wa kullu dhālika ‘indī. Allāhumma ghfir lī mā qaddamtu wa mā akhkhartu, wa mā asrartu wa mā a‘lantu, wa mā anta a‘lamu bihī minnī. Anta l-muqaddimu wa anta l-mu’akhkhiru, wa anta ‘alā kulli shay’in qadīr.", source: "Ṣaḥīḥ al-Bukhārī (6399)." },
    { ar: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ زَوَالِ نِعْمَتِكَ، وَتَحَوُّلِ عَافِيَتِكَ، وَفُجَاءَةِ نِقْمَتِكَ، وَجَمِيعِ سَخَطِكَ.", en: "O Allah, I seek refuge in You from the removal of Your blessing, the changing of Your well-being (into illness), the sudden onset of Your punishment, and all of Your displeasure.", translit: "Allāhumma innī a‘ūdhu bika min zawāli ni‘matika, wa taḥawwuli ‘āfiyatika, wa fujā’ati niqmatika, wa jamī‘i sakhaṭik.", source: "Ṣaḥīḥ Muslim (2739).", tafsir: "“Fujā’atu niqmatika” = sudden unexpected retribution, punishment, and wrath." },
    { ar: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْعَجْزِ وَالْكَسَلِ، وَالْجُبْنِ وَالْبُخْلِ وَالْهَرَمِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، وَأَعُوذُ بِكَ مِنْ فِتْنَةِ الْمَحْيَا وَالْمَمَاتِ.", en: "O Allah, I seek refuge in You from incapacity, laziness, cowardice, miserliness, old age, and I seek refuge in You from the torment of the grave, and I seek refuge in You from the trial of life and death.", translit: "Allāhumma innī a‘ūdhu bika mina l-‘ajzi wa l-kasali, wa l-jubni wa l-bukhli wa l-harami, wa a‘ūdhu bika min ‘adhābi l-qabr, wa a‘ūdhu bika min fitnati l-maḥyā wa l-mamāt.", source: "Ṣaḥīḥ al-Bukhārī (6367)." },
    { ar: "اللَّهُمَّ اجْعَلْ فِي قَلْبِي نُورًا، وَفِي بَصَرِي نُورًا، وَفِي سَمْعِي نُورًا، وَعَنْ يَمِينِي نُورًا، وَعَنْ يَسَارِي نُورًا، وَفَوْقِي نُورًا، وَتَحْتِي نُورًا، وَأَمَامِي نُورًا، وَخَلْفِي نُورًا، وَاجْعَلْ لِي نُورًا.", en: "O Allah, place light in my heart, light in my sight, light in my hearing, light on my right, light on my left, light above me, light below me, light in front of me, light behind me, and grant me light.", translit: "Allāhumma j‘al fī qalbī nūran, wa fī baṣarī nūran, wa fī sam‘ī nūran, wa ‘an yamīnī nūran, wa ‘a yasārī nūran, wa fawqī nūran, wa taḥtī nūran, wa amāmī nūran, wa khalfī nūran, waj‘al lī nūran.", source: "Ṣaḥīḥ al-Bukhārī (6316)." }
];

let currentLang='ar', isDarkMode=false, currentAccent='#cc0000', audioCtx=null, showTranslit=true, 
    showSource=true, currentView='home', currentRuqyahSub='self', selectedDuaIndex=-1;
let favoritesList = JSON.parse(localStorage.getItem('dua_favorites') || '[]');

function playClickSound(){ 
    const chk=document.getElementById('chkClick'); 
    if(!chk||!chk.checked) return; 
    try{ 
        if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); 
        const now=audioCtx.currentTime,osc=audioCtx.createOscillator(),gain=audioCtx.createGain(); 
        osc.connect(gain); gain.connect(audioCtx.destination); 
        osc.frequency.value=800; 
        gain.gain.setValueAtTime(0.1,now); 
        gain.gain.exponentialRampToValueAtTime(0.00001,now+0.12); 
        osc.start(); osc.stop(now+0.1); 
    }catch(e){} 
}

function playVibration(){ 
    const chk=document.getElementById('chkVibrate'); 
    if(chk&&chk.checked&&navigator.vibrate) navigator.vibrate(60); 
}

    document.getElementById('favBackText').innerText=t.back;

    if(currentLang==='ar'){

    } else { 
        document.body.classList.add('text-ltr');

    }

    refreshListView(); 
    updateGlobalFavIcon(); 
}

function saveFavorites(){ localStorage.setItem('dua_favorites', JSON.stringify(favoritesList)); }

function isFavorited(duaAr){ 
    return favoritesList.some(f=>f.ar === duaAr); 
}

function addFavorite(dua){ 
    if(!isFavorited(dua.ar)){ 
        favoritesList.push(dua); 
        saveFavorites(); 
        refreshListView();
    } 
}

function removeFavorite(duaAr){ 
    favoritesList=favoritesList.filter(f=>f.ar !== duaAr); 
    saveFavorites(); 
    refreshListView();
}

function refreshListView() {
    if(currentView === 'ruqyah') renderDuas(currentRuqyahSub==='self'?ruqyahSelf:ruqyahOther); 
    else if(currentView === 'sunnah') renderDuas(sunnahDuas); 
    else if(currentView === 'favorites') renderFavorites(); 
}

function getHeartStrokeColor(){ 
    return isDarkMode ? 'white' : '#333333'; 
}

// ==================== LIST RENDERING ====================

function renderDuas(data){ 
    const container=document.getElementById('duaListContainer'); 
    container.innerHTML=''; 

    data.forEach((dua,idx)=>{ 
        const card=document.createElement('div'); 
        card.className='dua-card';
        if(idx === selectedDuaIndex) card.classList.add('selected');

        const header=document.createElement('div'); 
        header.className='dua-header'; 

        const num=document.createElement('div'); 
        num.className='dua-number'; 
        num.innerText=(idx+1)+'.'; 

        const fav=isFavorited(dua.ar); 
        const favBtn=document.createElement('button'); 
        favBtn.className='fav-btn-small'; 
        const strokeColor=getHeartStrokeColor(); 
        favBtn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${fav?'#ff4444':'none'}" stroke="${fav?'#ff4444':strokeColor}" stroke-width="1.5"/></svg>`; 
        favBtn.onclick=(e)=>{ 
            e.stopPropagation(); 
            if(fav) removeFavorite(dua.ar); 
            else addFavorite(dua); 
            playClickSound(); 
        }; 

        header.append(num, favBtn); 

        const arabic=document.createElement('div'); 
        arabic.className='dua-arabic'; 
        arabic.innerText=dua.ar; 

        const trans=document.createElement('div'); 
        trans.className='dua-translation'; 
        trans.innerText=dua.en; 

        if(currentLang==='ar'){ 
            arabic.classList.add('dua-main-lang'); 
            trans.classList.add('dua-secondary-lang'); 
        } else { 
            trans.classList.add('dua-main-lang'); 
            arabic.classList.add('dua-secondary-lang'); 
        } 

        card.append(header); 
        if(currentLang==='ar'){ card.append(arabic, trans); } else { card.append(trans, arabic); }
        if(showTranslit) {
            const tl=document.createElement('div'); 
            tl.className='dua-transliteration'; 
            tl.innerText=dua.translit; 
            card.appendChild(tl); 
        }

        // Information Source Box
        if(showSource) {
            const sBox = document.createElement('div');
            sBox.className = 'dua-source-box';
            let sTxt = `<strong>${dua.source}</strong>`;
            if(dua.tafsir) sTxt += `<br>${dua.tafsir}`;
            if(dua.method) sTxt += `<br><span style="color:var(--accent)">${dua.method}</span>`;
            if(dua.note) sTxt += `<br><em>${dua.note}</em>`;
            sBox.innerHTML = sTxt;
            sBox.style.display = 'block';
            card.appendChild(sBox);
        }

        card.addEventListener('click',()=>{ 
            selectedDuaIndex = idx;
            document.querySelectorAll('.dua-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            showDuaModal(dua);
            playClickSound(); 
        }); 

        container.appendChild(card); 
    });
}

function showDuaModal(dua) {
    const modal = document.getElementById('duaModal');
    const output = document.getElementById('duaOutput');

    let content = '';
    if(currentLang === 'ar') {
        content = `<div style="font-weight:700; color:${isDarkMode ? 'var(--accent)' : '#1a1a1a'}; margin-bottom:15px;">${dua.ar}</div>`;
        content += `<div style="color:var(--text-dim); margin-bottom:10px;">${dua.en}</div>`;
    } else {
        content = `<div style="font-weight:700; color:${isDarkMode ? 'var(--accent)' : '#1a1a1a'}; margin-bottom:15px;">${dua.en}</div>`;
        content += `<div style="color:var(--text-dim); margin-bottom:10px; font-family:'Amiri',serif;">${dua.ar}</div>`;
    }
    if(showTranslit) {
        content += `<div style="color:var(--text-dim); font-style:italic; border-top:1px dashed var(--border-color); padding-top:10px; margin-top:10px;">${dua.translit}</div>`;
    }
    
    if(showSource) {
        content += `<div class="dua-source-box" style="display:block;">`;
        content += `<strong>${dua.source}</strong>`;
        if(dua.tafsir) content += `<br>${dua.tafsir}`;
        if(dua.method) content += `<br><span style="color:var(--accent)">${dua.method}</span>`;
        if(dua.note) content += `<br><em>${dua.note}</em>`;
        content += `</div>`;
    }

    output.innerHTML = content;
    modal.style.display = 'flex';
}

function renderFavorites(){ 
    const container=document.getElementById('favoritesListContainer'); 
    container.innerHTML=''; 
    if(favoritesList.length===0){ 
        container.innerHTML = `<div class="empty-fav">${translations[currentLang].noFavorites}</div>`;
        return; 
    } 
    favoritesList.forEach((dua,idx)=>{ 
        const card=document.createElement('div'); 
        card.className='dua-card'; 
        const header=document.createElement('div'); 
        header.className='dua-header'; 
        const num=document.createElement('div'); 
        num.className='dua-number'; 
        num.innerText=(idx+1)+'.'; 
        const favBtn=document.createElement('button'); 
        favBtn.className='fav-btn-small'; 
        favBtn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4444" stroke="#ff4444" stroke-width="0"/></svg>`; 
        favBtn.onclick=(e)=>{ 
            e.stopPropagation(); 
            removeFavorite(dua.ar); 
            playClickSound(); 
        }; 
        header.append(num, favBtn); 

        if(currentLang==='ar') card.innerHTML += `<div class="dua-arabic dua-main-lang">${dua.ar}</div><div class="dua-translation dua-secondary-lang">${dua.en}</div>`;
        else card.innerHTML += `<div class="dua-translation dua-main-lang">${dua.en}</div><div class="dua-arabic dua-secondary-lang">${dua.ar}</div>`;

        card.prepend(header);
        card.onclick=()=>showDuaModal(dua);
        container.appendChild(card); 
    });
}

    document.getElementById('ruqyahView').style.display='flex';

    document.getElementById('ruqyahView').style.display='none';

document.getElementById('chkTranslit').onchange=(e)=>{ showTranslit=e.target.checked; refreshListView(); playClickSound(); };

document.getElementById('langToggleBtn').onclick=()=>{ 
    currentLang=currentLang==='ar'?'en':'ar'; applyLanguage(); playClickSound(); 
};

const menuBtn=document.getElementById('menuToggleBtn'), menu=document.getElementById('unifiedMenu');
menuBtn.onclick=(e)=>{ e.stopPropagation(); menu.classList.toggle('show'); playClickSound(); };
document.onclick=(e)=>{ if(!menu.contains(e.target)) menu.classList.remove('show'); };

// Theme logic
function updateFullTheme(){ 
    document.documentElement.style.setProperty('--accent', currentAccent); 
    document.documentElement.style.setProperty('--header-bg', currentAccent); 
    isDarkMode?document.body.classList.add('dark-mode'):document.body.classList.remove('dark-mode'); 
    document.getElementById('sunIcon').classList.toggle('active', !isDarkMode);
    document.getElementById('moonIcon').classList.toggle('active', isDarkMode);
    refreshListView();
}
document.getElementById('themeToggle').onchange=(e)=>{ isDarkMode=e.target.checked; updateFullTheme(); playClickSound(); };

function setAccent(color){ currentAccent=color; updateFullTheme(); }
const colors = ['#cc0000', '#800080', '#0066cc', '#228b22', '#ff8c00', '#444444'];
colors.forEach(c=>{
    const dot=document.createElement('div'); dot.className='color-dot'; dot.style.backgroundColor=c;
    dot.onclick=()=>{ setAccent(c); playClickSound(); };
    document.getElementById('colorMenu').appendChild(dot);
});

// Original Actions
document.getElementById('btnGrid').onclick=()=>{ document.getElementById('gridContainer').classList.toggle('grid-3cols'); playClickSound(); };
document.getElementById('btnRefresh').onclick=()=>location.reload();
document.getElementById('btnCopy').onclick=()=>{
    let txt = document.getElementById('duaOutput').innerText;
    if(txt) navigator.clipboard.writeText(txt);
    playClickSound();
};

function changeIcon() { playClickSound(); }
function updateColorTooltips() {}
function updateGlobalFavIcon() {}

applyLanguage();
updateFullTheme();

</script>
</body>
</html>
