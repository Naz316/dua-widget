<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الدعاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #00a0d1;
            --bg-color: #ffffff;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header: grid icon left, title centered */
        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .grid-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .grid-toggle img {
            width: 30px;
            height: 30px;
            filter: invert(1);
            opacity: 0.95;
        }
        .grid-toggle:hover img {
            opacity: 1;
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        /* invisible spacer to keep layout balanced */
        .header-left {
            visibility: hidden;
            width: 38px;
        }

        /* --- ENVELOPE CARD (FIXED FLAP) --- */
        .message-container {
            padding: 25px 20px;
            perspective: 1000px;
        }

        .message-card {
            background: white;
            border-radius: 35px;
            padding: 65px 20px 35px 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid #f0f0f0;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            animation: mailSwing 1.2s ease-out forwards;
            transform-origin: top center;
        }

        .message-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background-color: #f9fbfc;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            border-bottom: 1px solid #e2e8f0;
            z-index: 1;
        }

        .message-card h2,
        .message-card .sub-title,
        .message-card p,
        .message-card .open-link {
            position: relative;
            z-index: 2;
        }

        @keyframes mailSwing {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(12deg); }
            30% { transform: rotate(-10deg); }
            45% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            75% { transform: rotate(3deg); }
            90% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }

        .message-card h2 {
            font-size: 1.6rem;
            margin-bottom: 4px;
            color: #000;
            font-weight: 800;
        }

        .message-card .sub-title {
            color: #b0b0b0;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .message-card p {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .message-card .open-link {
            color: var(--primary-blue);
            font-weight: 800;
            font-size: 1.1rem;
            text-decoration: none;
        }

        /* --- GRID (2 columns default, toggle to 3) --- */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 20px 40px 20px;
            transition: all 0.2s;
        }
        .grid-container.grid-3cols {
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .grid-item {
            background: white;
            border-radius: 25px;
            padding: 30px 10px;
            text-align: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #f5f7f9;
            position: relative;
            transition: 0.2s;
        }

        .grid-item:active { transform: scale(0.96); }

        .grid-item img {
            width: 70px;
            height: 70px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .grid-item span {
            font-weight: 700;
            font-size: 1rem;
            color: #000;
        }

        /* Top-Left Red Ribbon */
        .ribbon {
            position: absolute;
            top: 0;
            left: 18px;
            width: 14px;
            height: 22px;
            background: #ff5c75;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 80%, 0 100%);
        }

        /* Responsive: force 2 cols on small screens */
        @media (max-width: 480px) {
            .grid-container.grid-3cols {
                grid-template-columns: repeat(2, 1fr);
            }
            .grid-item span {
                font-size: 0.9rem;
            }
        }

        /* Modal */
        #duaModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 40px 25px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .dua-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 30px;
        }

        .close-modal {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="grid-toggle" id="gridToggleBtn">
            <img src="https://cdn-icons-png.flaticon.com/128/18728/18728011.png" alt="تبديل الشبكة">
        </div>
        <div class="header-title">الدعاء</div>
        <div class="header-left"></div> <!-- spacer for centering -->
    </header>

    <div class="message-container">
        <div class="message-card" onclick="showDailyDua()">
            <h2>رسالتك اليوم</h2>
            <div class="sub-title">رسالتك اليوم</div>
            <p>قد يكون وراء هذا الدعاء رسالة كُتبت لك وأنت اليوم أشد ما تحتاجها</p>
            <div class="open-link">اضغط هنا لتفتحها</div>
        </div>
    </div>

    <!-- Grid reordered: Sunnah placed right next to Quranic -->
    <div class="grid-container" id="gridContainer">
        <div class="grid-item">
            <img src="https://cdn-icons-png.flaticon.com/128/7246/7246452.png" alt="ruqya">
            <span>الرقية الشرعية</span>
        </div>
        <div class="grid-item">
            <div class="ribbon"></div>
            <img src="https://cdn-icons-png.flaticon.com/128/17185/17185688.png" alt="wird">
            <span>ورد الدعاء</span>
        </div>
        <div class="grid-item">
            <div class="ribbon"></div>
            <img src="https://cdn-icons-png.flaticon.com/128/5228/5228125.png" alt="quran">
            <span>دعاء من القرآن</span>
        </div>
        <div class="grid-item">
            <div class="ribbon"></div>
            <img src="https://cdn-icons-png.flaticon.com/128/4447/4447135.png" alt="sunnah">
            <span>دعاء من السنة</span>
        </div>
        <div class="grid-item">
            <img src="https://cdn-icons-png.flaticon.com/128/14900/14900883.png" alt="personal">
            <span>أدعيتي</span>
        </div>
        <div class="grid-item">
            <img src="https://cdn-icons-png.flaticon.com/128/17003/17003566.png" alt="favorites">
            <span>المفضلة</span>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="duaModal">
    <div class="modal-content">
        <div class="dua-text" id="duaOutput"></div>
        <button class="close-modal" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    const duas = [
        "اللهم إني أسألك علماً نافعاً، ورزقاً طيباً، وعملاً متقبلاً.",
        "يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين.",
        "اللهم إنك عفو تحب العفو فاعف عني.",
        "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ.",
        "لا إله إلا أنت سبحانك إني كنت من الظالمين."
    ];

    function showDailyDua() {
        const modal = document.getElementById('duaModal');
        const output = document.getElementById('duaOutput');
        const now = new Date();
        const hourIndex = now.getHours() % duas.length;
        output.innerText = duas[hourIndex];
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('duaModal').style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('duaModal')) closeModal();
    }

    // Grid toggle (2 ↔ 3 columns)
    const gridContainer = document.getElementById('gridContainer');
    const toggleBtn = document.getElementById('gridToggleBtn');
    let is3Cols = false;

    toggleBtn.addEventListener('click', () => {
        if (is3Cols) {
            gridContainer.classList.remove('grid-3cols');
        } else {
            gridContainer.classList.add('grid-3cols');
        }
        is3Cols = !is3Cols;
    });
</script>

</body>
</html>
