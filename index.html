<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الدعاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0099cc;
            --bg-color: #f2f5f8;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 0;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: white;
            min-height: 100vh;
            position: relative;
        }

        /* Header */
        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn {
            position: absolute;
            left: 15px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Message of the Day Card */
        .message-container {
            padding: 20px;
            perspective: 1000px;
        }

        .message-card {
            background: white;
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid #eee;
            position: relative;
            cursor: pointer;
            /* The Swinging Animation */
            animation: swing 4s ease-in-out infinite;
            transform-origin: top center;
        }

        @keyframes swing {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            50% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

        .message-card h2 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: #000;
        }

        .message-card p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .message-card .open-link {
            color: var(--primary-blue);
            font-weight: bold;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* Icons Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px 30px 20px;
        }

        .grid-item {
            background: white;
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .grid-item:active {
            transform: scale(0.95);
        }

        .grid-item img {
            width: 60px;
            height: 60px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .grid-item span {
            font-weight: 700;
            font-size: 1rem;
            color: #000;
        }

        /* Notification Dot */
        .grid-item { position: relative; }
        .bookmark-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ff4d4d;
            font-size: 1.2rem;
        }

        /* Modal styling */
        #duaModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .dua-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 20px;
        }

        .close-modal {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <span class="back-btn">❯</span>
        الدعاء
    </header>

    <!-- Message of the day -->
    <div class="message-container">
        <div class="message-card" onclick="showDailyDua()">
            <h2>رسالتك اليوم</h2>
            <p>قد يكون وراء هذا الدعاء رسالة كُتبت لك وأنت اليوم أشد ما تحتاجها</p>
            <div class="open-link">اضغط هنا لتفتحها</div>
        </div>
    </div>

    <!-- Grid -->
    <div class="grid-container">
        <div class="grid-item">
            <img src="https://cdn-icons-png.flaticon.com/128/7246/7246452.png" alt="ruqya">
            <span>الرقية الشرعية</span>
        </div>
        <div class="grid-item">
            <img src="https://cdn-icons-png.flaticon.com/128/17185/17185688.png" alt="wird">
            <span>ورد الدعاء</span>
        </div>
        <div class="grid-item">
            <span class="bookmark-icon">🔖</span>
            <img src="https://cdn-icons-png.flaticon.com/128/5228/5228125.png" alt="quran">
            <span>دعاء من القرآن</span>
        </div>
        <div class="grid-item">
            <img src="https://cdn-icons-png.flaticon.com/128/14900/14900883.png" alt="community">
            <span>مجتمع الدعاء</span>
        </div>
        <div class="grid-item">
            <img src="https://cdn-icons-png.flaticon.com/128/17003/17003566.png" alt="favorites">
            <span>المفضلة</span>
        </div>
        <div class="grid-item">
            <span class="bookmark-icon">🔖</span>
            <img src="https://cdn-icons-png.flaticon.com/128/4447/4447135.png" alt="sunnah">
            <span>دعاء من السنة</span>
        </div>
    </div>
</div>

<!-- Modal to show the Dua -->
<div id="duaModal">
    <div class="modal-content">
        <div class="dua-text" id="duaOutput"></div>
        <button class="close-modal" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    const duas = [
        "اللهم إني أسألك علماً نافعاً، ورزقاً طيباً، وعملاً متقبلاً.",
        "اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت.",
        "يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين.",
        "اللهم إنك عفو تحب العفو فاعف عني.",
        "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ.",
        "اللهم صل وسلم على نبينا محمد وعلى آله وصحبه أجمعين."
    ];

    function showDailyDua() {
        const modal = document.getElementById('duaModal');
        const output = document.getElementById('duaOutput');
        
        // Logical choice: Change based on the current hour of the day
        // This ensures every user sees the same dua for that hour
        const now = new Date();
        const hourIndex = now.getHours() % duas.length;
        
        // Alternatively, use random: 
        // const randomIndex = Math.floor(Math.random() * duas.length);
        
        output.innerText = duas[hourIndex];
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('duaModal').style.display = 'none';
    }

    // Close modal if clicking outside the box
    window.onclick = function(event) {
        let modal = document.getElementById('duaModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
