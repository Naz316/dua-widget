<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الدعاء · الرقية الشرعية · الأذكار</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #cc0000;
            --accent-soft: rgba(204,0,0,0.15);
            --widget-bg: #ffffff;
            --header-bg: #cc0000;
            --text: #1a1a1a;
            --text-dim: #666666;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --popup-bg: #ffffff;
            --popup-border: #ddd;
            --shadow: 0 8px 20px rgba(0,0,0,0.05);
            --dua-font-size: 22px;
            --envelope-flap: #d0d0d0;
            --heart-stroke-light: #333333;
            --heart-stroke-dark: #ffffff;
        }

        body.dark-mode {
            --widget-bg: #1e1e2f;
            --header-bg: #2d2d44;
            --text: #ffffff;
            --text-dim: #aaaaaa;
            --card-bg: #2a2a3a;
            --border-color: #3a3a4a;
            --popup-bg: #2a2a3a;
            --popup-border: #444;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
            --envelope-flap: #555555;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease;
            font-family: 'Tajawal', 'Inter', sans-serif;
        }

        .dua-translation, .message-card p, .message-card .sub-title, .grid-item span, .menu-section-title span:last-child, .setting-label span:last-child, .setting-row, .share-popup-title, .empty-fav {
            font-family: 'Inter', sans-serif;
        }
        .dua-arabic, .dua-transliteration, .message-card h2, .message-card .open-link, .dua-number, .subcategory-btn, .back-button, .tab span, .tab label {
            font-family: 'Amiri', 'Tajawal', serif;
        }
        body.dark-mode { background-color: #12121a; }

        body.text-rtl .message-card, body.text-rtl .dua-card { direction: rtl; text-align: right; }
        body.text-ltr .message-card, body.text-ltr .dua-card { direction: ltr; text-align: left; }

        body.text-rtl .menu-popover .menu-section-title { text-align: left; justify-content: flex-start; direction: ltr; }
        body.text-ltr .menu-popover .menu-section-title { text-align: left; justify-content: flex-start; }

        .grid-item { text-align: center !important; }
        .message-card { text-align: center !important; }

        body.text-rtl .dua-header { flex-direction: row-reverse; }
        body.text-ltr .dua-header { flex-direction: row; }

        body:not(.dark-mode) .fav-btn-small svg path { stroke: var(--heart-stroke-light) !important; }
        body.dark-mode .fav-btn-small svg path { stroke: var(--heart-stroke-dark) !important; }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--widget-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        header {
            background-color: var(--header-bg);
            padding: 14px 18px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            direction: ltr !important;
        }
        .header-icons {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-left: auto;
            flex-direction: row;
            direction: ltr !important;
        }
        .icon-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .icon-btn img { width: auto; height: auto; max-width: 24px; max-height: 24px; filter: invert(1); display: block; }
        .menu-icon span { font-size: 26px; font-weight: bold; color: white; line-height: 1; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .floating-icon {
            width: 50px;
            height: 50px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.2s;
        }
        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .message-container { padding: 25px 20px; perspective: 1000px; }
        .message-card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 60px 20px 35px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            animation: mailSwing 1.2s ease-out forwards;
        }
        .message-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: var(--envelope-flap);
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 2;
        }
        @keyframes mailSwing {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(12deg); }
            30% { transform: rotate(-10deg); }
            45% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            75% { transform: rotate(3deg); }
            90% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }
        .message-card h2 { font-size: 1.6rem; margin-bottom: 4px; color: var(--text); font-weight: 800; }
        .message-card .sub-title { color: var(--text-dim); font-size: 1rem; margin-bottom: 15px; }
        .message-card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6; }
        .message-card .open-link { color: var(--accent); font-weight: 800; font-size: 1.1rem; text-decoration: none; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 20px 40px 20px;
            direction: ltr !important;
        }
        .grid-container.grid-3cols { grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .grid-item {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 24px 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            box-shadow: var(--shadow);
            color: var(--text);
        }
        .grid-item:active { transform: scale(0.96); }
        .grid-item img { width: 70px; height: 70px; margin-bottom: 12px; object-fit: contain; }
        .grid-item span { font-weight: 700; font-size: 1rem; color: var(--text); }

        .ruqyah-view, .favorites-view {
            display: none;
            flex-direction: column;
            padding: 0 20px 20px 20px;
        }
        .subcategory-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0 15px 0;
        }
        .subcategory-btn {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text);
            transition: 0.2s;
        }
        .subcategory-btn.active { background: var(--accent); color: white; }
        .back-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }
        .dua-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        .dua-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border-left: 4px solid var(--accent);
            box-shadow: var(--shadow);
            transition: 0.2s;
            position: relative;
        }
        .dua-card.selected {
            background: var(--accent-soft);
            transform: scale(0.98);
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 12px rgba(204,0,0,0.2);
        }
        .dua-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .dua-number {
            font-weight: bold;
            color: var(--accent);
            font-size: 0.9rem;
        }
        .fav-btn-small {
            background: none;
            border: none;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .fav-btn-small:hover { transform: scale(1.15); }
        .fav-btn-small svg { width: 22px; height: 22px; }

        .dua-arabic { 
            font-size: var(--dua-font-size); 
            font-family: 'Amiri', serif; 
            line-height: 1.6; 
            margin-bottom: 8px; 
        }
        .dua-translation { 
            font-size: calc(var(--dua-font-size) * 0.75); 
            margin-bottom: 6px; 
            line-height: 1.5;
        }
        .dua-transliteration { 
            font-size: calc(var(--dua-font-size) * 0.7); 
            font-style: italic; 
            border-top: 1px dashed var(--border-color); 
            padding-top: 6px; 
            margin-top: 4px; 
            color: var(--text-dim) !important;
        }

        .dua-main-lang { font-weight: 700; }
        .dua-secondary-lang { font-weight: 400; color: var(--text-dim) !important; }

        body:not(.dark-mode) .dua-main-lang { color: #1a1a1a !important; }
        body.dark-mode .dua-main-lang { color: var(--accent) !important; }

        .menu-popover {
            position: fixed; 
            top: 70px; 
            right: 18px; 
            background: var(--popup-bg); 
            padding: 18px;
            border-radius: 20px; 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.15s; 
            z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            border: 1px solid var(--popup-border); 
            width: 290px; 
            direction: ltr;
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        .menu-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .menu-section-title { 
            color: var(--text); 
            font-size: 14px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            text-align: left;
        }
        .theme-toggle { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(128,128,128,0.15); 
            border-radius: 30px; 
            padding: 4px; 
        }
        .theme-toggle-icon { font-size: 18px; width: 28px; text-align: center; cursor: pointer; opacity: 0.6; color: var(--text); }
        .theme-toggle-icon.active { opacity: 1; filter: drop-shadow(0 0 2px var(--accent)); }
        .theme-switch { position: relative; display: inline-block; width: 52px; height: 26px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #ccc; 
            transition: 0.2s; 
            border-radius: 26px; 
        }
        .theme-slider:before { 
            position: absolute; content: ""; 
            height: 22px; width: 22px; 
            left: 2px; bottom: 2px; 
            background-color: white; 
            transition: 0.2s; 
            border-radius: 50%; 
        }
        input:checked + .theme-slider { background-color: var(--accent); }
        input:checked + .theme-slider:before { transform: translateX(26px); }
        .menu-divider { height: 1px; background: var(--text-dim); margin: 12px 0; border: none; opacity: 0.3; }
        .color-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .color-dot { 
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; 
            display: flex; align-items: center; justify-content: center; transition: 0.1s; 
        }
        .color-dot.active { border-color: var(--text); transform: scale(1.08); }
        .color-dot.active::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .settings-rows { display: flex; flex-direction: column; gap: 12px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; color: var(--text); font-size: 13px; font-weight: 600; }
        .setting-label { display: flex; align-items: center; gap: 8px; }
        .font-slider { width: 100px; accent-color: var(--accent); cursor: pointer; }
        .action-btns { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--text-dim); }
        .action-btn { 
            flex: 1; height: 42px; border-radius: 12px; border: none; cursor: pointer; 
            background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; 
            transition: 0.2s; position: relative; 
        }
        .action-btn svg { width: 20px; height: 20px; fill: white; }
        .action-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .action-btn::after { 
            content: attr(data-tooltip); position: absolute; bottom: 50px; 
            background: #333; color: white; font-size: 11px; padding: 4px 10px; 
            border-radius: 6px; visibility: hidden; opacity: 0; transition: 0.15s; 
            white-space: nowrap; pointer-events: none; z-index: 2000; 
        }
        .action-btn:hover::after { visibility: visible; opacity: 1; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #555; transition: .15s; border-radius: 24px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 18px; width: 18px; 
            left: 3px; bottom: 3px; background-color: #ddd; transition: .15s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        .share-popup {
            position: fixed; bottom: 100px; right: 20px; 
            background: var(--popup-bg); border-radius: 28px; padding: 20px; 
            width: 300px; z-index: 1100; box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid var(--accent); visibility: hidden; opacity: 0; 
            transition: 0.15s ease; transform: scale(0.95);
        }
        .share-popup.show { visibility: visible; opacity: 1; transform: scale(1); }
        .share-popup-title { text-align: center; font-weight: 700; font-size: 18px; margin-bottom: 18px; color: var(--accent); }
        .share-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; justify-items: center; }
        .share-icon {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; color: var(--accent); font-size: 12px; font-weight: 500;
        }
        .share-icon svg {
            width: 48px; height: 48px; background: rgba(128,128,128,0.2); 
            border-radius: 30px; padding: 10px; stroke: var(--accent);
        }

        #duaModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { 
            background: var(--card-bg); padding: 40px 25px; border-radius: 30px; 
            width: 100%; max-width: 380px; text-align: center; color: var(--text); 
        }
        .dua-text { font-size: var(--dua-font-size); line-height: 1.8; margin-bottom: 30px; font-family: 'Amiri', serif; }
        .close-modal { 
            background: var(--accent); color: white; border: none; padding: 12px 35px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; 
        }
        .empty-fav { opacity: 0.8; font-style: italic; text-align: center; padding: 30px; color: var(--text-dim); }
    </style>
</head>
<body class="text-rtl">
<div class="app-container">
    <header>
        <div class="header-icons" style="width:100%; justify-content:space-between; align-items:center;">
            <button class="icon-btn lang-btn" id="langToggleBtn"><img src="https://cdn-icons-png.flaticon.com/128/4570/4570372.png" alt="language"></button>
            <div class="header-center">
                <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/13773/13773984.png" onclick="changeIcon()" alt="Icon">
            </div>
            <button class="icon-btn menu-icon" id="menuToggleBtn"><span>☰</span></button>
        </div>
    </header>

    <div class="message-container" id="messageContainer">
        <div class="message-card" id="dailyMessageCard">
            <h2 id="msgTitle">رسالتك اليوم</h2>
            <div class="sub-title" id="msgSub">رسالتك اليوم</div>
            <p id="msgText">قد يكون وراء هذا الدعاء رسالة كُتبت لك وأنت اليوم أشد ما تحتاجها</p>
            <div class="open-link" id="msgLink">اضغط هنا لتفتحها</div>
        </div>
    </div>

    <div class="grid-container" id="gridContainer">
        <div class="grid-item" data-category="ruqya"><img src="https://cdn-icons-png.flaticon.com/128/7246/7246452.png" alt="ruqya"><span id="labelRuqya">الرقية الشرعية</span></div>
        <div class="grid-item" data-category="wird"><img src="https://cdn-icons-png.flaticon.com/128/17185/17185688.png" alt="wird"><span id="labelWird">ورد الدعاء</span></div>
        <div class="grid-item" data-category="quranic"><img src="https://cdn-icons-png.flaticon.com/128/5228/5228125.png" alt="quran"><span id="labelQuranic">دعاء من القرآن</span></div>
        <div class="grid-item" data-category="personal"><img src="https://cdn-icons-png.flaticon.com/128/14900/14900883.png" alt="personal"><span id="labelPersonal">أدعيتي</span></div>
        <div class="grid-item" data-category="favorites"><img src="https://cdn-icons-png.flaticon.com/128/17003/17003566.png" alt="favorites"><span id="labelFavorites">المفضلة</span></div>
        <div class="grid-item" data-category="sunnah"><img src="https://cdn-icons-png.flaticon.com/128/4447/4447135.png" alt="sunnah"><span id="labelSunnah">دعاء من السنة</span></div>
    </div>

    <div class="ruqyah-view" id="ruqyahView">
        <div class="subcategory-buttons">
            <button class="subcategory-btn active" data-sub="self" id="selfBtn">ارق نفسك</button>
            <button class="subcategory-btn" data-sub="other" id="otherBtn">ارق غيرك</button>
        </div>
        <button class="back-button" id="backFromRuqyah"><span>←</span> <span id="backText">رجوع</span></button>
        <div class="dua-list-container" id="duaListContainer"></div>
    </div>

    <div class="favorites-view" id="favoritesView">
        <button class="back-button" id="backFromFavorites"><span>←</span> <span id="favBackText">رجوع</span></button>
        <div class="dua-list-container" id="favoritesListContainer"></div>
    </div>

    <div id="sharePopup" class="share-popup">
        <div class="share-popup-title" id="shareTitle">مشاركة الدعاء</div>
        <div class="share-grid" id="shareGrid"></div>
    </div>

    <div id="duaModal">
        <div class="modal-content">
            <div class="dua-text" id="duaOutput"></div>
            <button class="close-modal" id="closeModalBtn">إغلاق</button>
        </div>
    </div>
</div>

<div class="menu-popover" id="unifiedMenu">
    <div class="menu-header-row">
        <div class="menu-section-title"><span>🎨</span><span id="menuTitleColors">الألوان</span></div>
        <div class="theme-toggle">
            <span class="theme-toggle-icon sun active" id="sunIcon">☀️</span>
            <label class="theme-switch"><input type="checkbox" id="themeToggle"><span class="theme-slider"></span></label>
            <span class="theme-toggle-icon moon" id="moonIcon">🌙</span>
        </div>
    </div>
    <hr class="menu-divider">
    <div class="color-menu" id="colorMenu"></div>
    <div class="menu-section-title"><span>⚙️</span><span id="menuTitleSettings">الإعدادات</span></div>
    <hr class="menu-divider">
    <div class="settings-rows">
        <div class="setting-row"><div class="setting-label"><span>🔊</span><span id="set1">صوت النقرة</span></div><label class="switch"><input type="checkbox" id="chkClick" checked><span class="slider"></span></label></div>
        <div class="setting-row"><div class="setting-label"><span>📳</span><span id="set2">اهتزاز</span></div><label class="switch"><input type="checkbox" id="chkVibrate" checked><span class="slider"></span></label></div>
        <div class="setting-row"><div class="setting-label"><span>🔄</span><span id="set3">تحويل تلقائي</span></div><label class="switch"><input type="checkbox" id="chkAuto" checked><span class="slider"></span></label></div>
        <div class="setting-row"><div class="setting-label"><span>🔤</span><span id="setTranslit">الترجمة الصوتية</span></div><label class="switch"><input type="checkbox" id="chkTranslit" checked><span class="slider"></span></label></div>
        <div class="setting-row"><div class="setting-label"><span>📏</span><span id="set4">حجم الخط (الدعاء فقط)</span></div><input type="range" min="16" max="36" value="22" class="font-slider" id="fontSlider"></div>
        <div class="action-btns">
            <button class="action-btn" id="btnCopy" data-tooltip="نسخ النص">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
            <button class="action-btn" id="btnShare" data-tooltip="مشاركة">

<script>
// ==================== RUQYAH DATA ====================
const ruqyahSelf = [
    { ar: "أَعُوذُ بِاللهِ السَّمِيعِ الْعَلِيمِ مِنَ الشَّيْطَانِ الرَّجِيمِ مِنْ هَمْزِهِ، وَنَفْخِهِ، وَنَفْثِهِ.", translit: "A'udhu billahi as-samee'il 'aleemi min ash-shaytani ar-rajeemi min hamzihi, wa nafkhihi, wa nafthihi.", en: "I seek refuge in Allah, the All-Hearing, the All-Knowing, from the accursed Satan, from his evil whispers, his puffing up with pride, and his blowing." },
    { ar: "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ. الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ...", translit: "Bismillahi ar-rahmani ar-raheem. Alhamdu lillahi rabbi al-alameen...", en: "Surah Al-Fatihah: In the name of Allah, the Most Gracious, the Most Merciful. All praise is due to Allah, Lord of the Worlds..." },
    { ar: "قُلْ هُوَ اللَّهُ أَحَدٌ * اللَّهُ الصَّمَدُ * لَمْ يَلِدْ وَلَمْ يُولَدْ * وَلَمْ يَكُنْ لَّهُ كُفُوًا أَحَدٌ.", translit: "Qul huwallahu ahad. Allahu as-samad. Lam yalid wa lam yulad. Wa lam yakun lahu kufuwan ahad.", en: "Surah Al-Ikhlas: Say, He is Allah, the One. Allah, the Eternal Refuge. He neither begets nor is born, nor is there to Him any equivalent." },
    { ar: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ * مِنْ شَرِّ مَا خَلَقَ * وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ * وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ * وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ.", translit: "Qul a'udhu birabbi al-falaq. Min sharri ma khalaq. Wa min sharri ghasiqin idha waqab. Wa min sharri an-naffathati fi al-uqad. Wa min sharri hasidin idha hasad.", en: "Surah Al-Falaq: Say, I seek refuge in the Lord of daybreak from the evil of that which He created, and from the evil of darkness when it settles..." },
    { ar: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ * مَلِكِ النَّاسِ * إِلَٰهِ النَّاسِ * مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ * الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ * مِنَ الْجِنَّةِ وَالنَّاسِ.", translit: "Qul a'udhu birabbi an-nas. Maliki an-nas. Ilahi an-nas. Min sharri al-waswasi al-khannas. Alladhi yuwaswisu fi suduri an-nas. Mina al-jinnati wa an-nas.", en: "Surah An-Nas: Say, I seek refuge in the Lord of mankind, the Sovereign of mankind, the God of mankind, from the evil of the retreating whisperer..." },
    { ar: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ...", translit: "Allahu la ilaha illa huwa al-hayyu al-qayyum. La ta'khudhuhu sinatun wa la nawm. Lahu ma fi as-samawati wa ma fi al-ard...", en: "Ayat-ul-Kursi: Allah! There is no deity except Him, the Ever-Living, the Sustainer of existence. Neither drowsiness overtakes Him nor sleep..." },
    { ar: "أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّةِ، مِنْ كُلِّ شَيْطَانٍ وَهَامَّةٍ، وَمِنْ كُلِّ عَيْنٍ لَامَّةٍ.", translit: "A'udhu bi-kalimati Allahi at-tammati, min kulli shaytanin wa hammatin, wa min kulli 'aynin lammatin.", en: "I seek refuge in the perfect words of Allah from every devil and every poisonous reptile, and from every evil eye." },
    { ar: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ، وَهُوَ السَّمِيعُ الْعَلِيمُ.", translit: "Bismillahi alladhi la yadurru ma'asmihi shay'un fi al-ardi wa la fi as-sama'i, wa huwa as-samee'u al-'aleem.", en: "In the name of Allah, with whose name nothing can cause harm on earth or in the heavens, and He is the All-Hearing, the All-Knowing." },
    { ar: "أَعُوذُ بِعِزَّةِ اللَّهِ وَقُدْرَتِهِ مِنْ شَرِّ مَا أَجِدُ وَأُحَاذِرُ.", translit: "A'udhu bi-'izzatillahi wa qudratihi min sharri ma ajidu wa uhadhiru.", en: "I seek refuge in the might and power of Allah from the evil of what I feel and what I fear." },
    { ar: "اللَّهُمَّ صَلِّ عَلَىٰ مُحَمَّدٍ وَعَلَىٰ آلِ مُحَمَّدٍ، كَمَا صَلَّيْتَ عَلَىٰ إِبْرَاهِيمَ وَعَلَىٰ آلِ إِبْرَاهِيمَ، إِنَّكَ حَمِيدٌ مَّجِيدٌ.", translit: "Allahumma salli 'ala Muhammadin wa 'ala ali Muhammad, kama sallayta 'ala Ibrahim wa 'ala ali Ibrahim, innaka hamidun majid.", en: "O Allah, send blessings upon Muhammad and upon the family of Muhammad, as You sent blessings upon Ibrahim and the family of Ibrahim. You are indeed Praiseworthy and Glorious." },
    { ar: "اللَّهُمَّ إِنِّيْ أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ.", translit: "Allahumma inni as'aluka al-'afwa wal-'afiyata fi ad-dunya wal-akhirah.", en: "O Allah, I ask You for forgiveness and well-being in this world and the Hereafter." },
    { ar: "أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ وَأَتُوبُ إِلَيْهِ.", translit: "Astaghfirullaha al-'azeem alladhi la ilaha illa huwa al-hayyu al-qayyum wa atubu ilayh.", en: "I seek forgiveness from Allah the Magnificent, there is no deity except Him, the Ever-Living, the Sustainer, and I repent to Him." },
    { ar: "يَا حَيُّ يَا قَيُّومُ، بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلَا تَكِلْنِي إِلَىٰ نَفْسِي طَرْفَةَ عَيْنٍ.", translit: "Ya hayyu ya qayyum, bi-rahmatika astaghithu, aslih li sha'ni kullahu, wa la takilni ila nafsi tarfata 'ayn.", en: "O Ever-Living One, O Eternal One, by Your mercy I seek help. Rectify for me all of my affairs and do not leave me to myself even for the blink of an eye." },
    { ar: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَأَعُوذُ بِكَ مِنَ الْعَجْزِ وَالْكَسَلِ...", translit: "Allahumma inni a'udhu bika min al-hammi wal-hazan, wa a'udhu bika min al-'ajzi wal-kasal...", en: "O Allah, I seek refuge in You from anxiety and sorrow, and from incapacity and laziness..." },
    { ar: "رَبِّ أَعُوذُ بِكَ مِنْ هَمَزَاتِ الشَّيْطَانِ، وَأَعُوذُ بِكَ رَبِّ أَنْ يَحْضُرُونِ.", translit: "Rabbi a'udhu bika min hamazati ash-shayateen, wa a'udhu bika rabbi an yahdurun.", en: "My Lord, I seek refuge in You from the incitements of the devils, and I seek refuge in You, my Lord, lest they be present with me." },
    { ar: "لَا إِلَٰهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الظَّالِمِينَ.", translit: "La ilaha illa anta subhanaka inni kuntu min az-zalimeen.", en: "There is no deity except You; exalted are You. Indeed, I have been of the wrongdoers." },
    { ar: "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ.", translit: "Hasbunallahu wa ni'ma al-wakeel.", en: "Sufficient for us is Allah, and He is the best Disposer of affairs." },
    { ar: "مَا شَاءَ اللَّهُ لَا قُوَّةَ إِلَّا بِاللَّهِ.", translit: "Ma sha' Allahu la quwwata illa billah.", en: "What Allah has willed, there is no power except with Allah." },
    { ar: "إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ. اللَّهُمَّ أْجُرْنِي فِي مُصِيبَتِي وَأَخْلِفْ لِي خَيْرًا مِنْهَا.", translit: "Inna lillahi wa inna ilayhi raji'un. Allahumma ujurni fi musibati wa akhlif li khayran minha.", en: "Indeed we belong to Allah, and indeed to Him we will return. O Allah, reward me for my affliction and replace it for me with something better." },
    { ar: "اللَّهُمَّ اشْفِنِي شِفَاءً لَا يُغَادِرُ سَقَمًا.", translit: "Allahumma ash-fini shifa'an la yughadiru saqaman.", en: "O Allah, cure me with a healing that leaves no sickness." },
    { ar: "أَعُوذُ بِوَجْهِ اللَّهِ الْكَرِيمِ، وَبِكَلِمَاتِ اللَّهِ التَّامَّاتِ، مِنْ شَرِّ مَا أَنْتَ آخِذٌ بِنَاصِيَتِهِ.", translit: "A'udhu bi-wajhillahi al-kareem, wa bi-kalimatillahi at-tammat, min sharri ma anta akhidhun bi-nasiyatih.", en: "I seek refuge in the Noble Countenance of Allah and in the perfect words of Allah from the evil of what You seize by its forelock." },
    { ar: "اللَّهُمَّ إِنِّي أَسْأَلُكَ مِنْ خَيْرِ مَا سَأَلَكَ مِنْهُ نَبِيُّكَ مُحَمَّدٌ...", translit: "Allahumma inni as'aluka min khayri ma sa'alaka minhu nabiyyuka Muhammad...", en: "O Allah, I ask You for the good that Your Prophet Muhammad asked You for..." },
    { ar: "اللَّهُمَّ رَحْمَتَكَ أَرْجُو فَلَا تَكِلْنِي إِلَىٰ نَفْسِي طَرْفَةَ عَيْنٍ...", translit: "Allahumma rahmataka arju fala takilni ila nafsi tarfata 'ayn...", en: "O Allah, it is Your mercy that I hope for, so do not leave me to myself for the blink of an eye..." },
    { ar: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ.", translit: "Subhanallahi wa bihamdihi, 'adada khalqihi, wa rida nafsihi, wa zinata 'arshihi, wa midada kalimatih.", en: "Glory be to Allah and praise Him, by the number of His creation, by His pleasure, by the weight of His Throne, and by the ink of His words." }
];

const ruqyahOther = ruqyahSelf.map((d, idx) => ({
    ar: d.ar.replace(/أَعُوذُ/g, 'أُعِيذُكَ').replace(/أَسْأَلُكَ/g, 'أَسْأَلُ لَكَ').replace(/اشْفِنِي/g, 'اشْفِهِ').replace(/عَافِنِي/g, 'عَافِهِ').replace(/أَصْلِحْ لِي/g, 'أَصْلِحْ لَهُ').replace(/تَكِلْنِي/g, 'تَكِلْهُ').replace(/نَفْسِي/g, 'نَفْسَهُ').replace(/أَجِرْنِي/g, 'أَجِرْهُ').replace(/أَخْلِفْ لِي/g, 'أَخْلِفْ لَهُ'),
    translit: d.translit,
    en: d.en.replace(/me/g, 'him').replace(/my/g, 'his').replace(/I /g, 'He ')
}));

// ==================== TRANSLATIONS ====================
const translations = {
    ar: { 
        msgTitle:"رسالتك اليوم", msgSub:"رسالتك اليوم", msgText:"قد يكون وراء هذا الدعاء رسالة كُتبت لك وأنت اليوم أشد ما تحتاجها", msgLink:"اضغط هنا لتفتحها", 
        ruqya:"الرقية الشرعية", wird:"ورد الدعاء", quranic:"دعاء من القرآن", personal:"أدعيتي", favorites:"المفضلة", sunnah:"دعاء من السنة", 
        menuColors:"الألوان", menuSettings:"الإعدادات", set1:"صوت النقرة", set2:"اهتزاز", set3:"تحويل تلقائي", set4:"حجم الخط", setTranslit:"الترجمة الصوتية", 
        copyTooltip:"نسخ النص", shareTooltip:"مشاركة", favTooltipAdd:"أضف إلى المفضلة", favTooltipRemove:"إزالة من المفضلة", refreshTooltip:"تحديث", 
        shareTitle:"مشاركة الدعاء", closeModal:"إغلاق", selfBtn:"ارق نفسك", otherBtn:"ارق غيرك", back:"رجوع", noFavorites:"لا توجد أدعية مفضلة"
    },
    en: { 
        msgTitle:"Your Message Today", msgSub:"Your message today", msgText:"Behind this supplication there may be a message written for you, and today you need it most.", msgLink:"Click here to open it", 
        ruqya:"Spiritual Ruqya", wird:"Daily Wird", quranic:"Quranic Duas", personal:"My Duas", favorites:"Favorites", sunnah:"Sunnah Duas", 
        menuColors:"Colors", menuSettings:"Settings", set1:"Click Sound", set2:"Vibration", set3:"Auto Transfer", set4:"Font Size", setTranslit:"Transliteration", 
        copyTooltip:"Copy Text", shareTooltip:"Share", favTooltipAdd:"Add to Favorites", favTooltipRemove:"Remove from Favorites", refreshTooltip:"Refresh", 
        shareTitle:"Share Dua", closeModal:"Close", selfBtn:"Heal Yourself", otherBtn:"Heal Others", back:"Back", noFavorites:"No favorite duas yet"

};

let currentLang='ar', isDarkMode=false, currentAccent='#cc0000', audioCtx=null, showTranslit=true, 
    ruqyahActive=false, favoritesActive=false, currentRuqyahSub='self', selectedDuaIndex=-1;
let favoritesList = JSON.parse(localStorage.getItem('dua_favorites') || '[]');

function playClickSound(){ 
    const chk=document.getElementById('chkClick'); if(!chk||!chk.checked) return; 
    try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); 
    const now=audioCtx.currentTime,osc=audioCtx.createOscillator(),gain=audioCtx.createGain(); 
    osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value=800; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.00001,now+0.12); osc.start(); osc.stop(now+0.1); 
    }catch(e){} 
}

function playVibration(){ const chk=document.getElementById('chkVibrate'); if(chk&&chk.checked&&navigator.vibrate) navigator.vibrate(60); }

function applyLanguage(){ 
    const t=translations[currentLang];
    document.getElementById('msgTitle').innerText=t.msgTitle;
    document.getElementById('msgSub').innerText=t.msgSub;
    document.getElementById('msgText').innerText=t.msgText;
    document.getElementById('msgLink').innerText=t.msgLink;
    document.getElementById('labelRuqya').innerText=t.ruqya;
    document.getElementById('labelWird').innerText=t.wird;
    document.getElementById('labelQuranic').innerText=t.quranic;
    document.getElementById('labelPersonal').innerText=t.personal;
    document.getElementById('labelFavorites').innerText=t.favorites;
    document.getElementById('labelSunnah').innerText=t.sunnah;
    document.getElementById('menuTitleColors').innerText=t.menuColors;
    document.getElementById('menuTitleSettings').innerText=t.menuSettings;
    document.getElementById('set1').innerText=t.set1;
    document.getElementById('set2').innerText=t.set2;
    document.getElementById('set3').innerText=t.set3;
    document.getElementById('set4').innerText=t.set4;
    document.getElementById('setTranslit').innerText=t.setTranslit;
    document.getElementById('shareTitle').innerText=t.shareTitle;
    document.getElementById('selfBtn').innerText=t.selfBtn;
    document.getElementById('otherBtn').innerText=t.otherBtn;
    document.getElementById('backText').innerText=t.back;
    document.getElementById('favBackText').innerText=t.back;
    document.getElementById('closeModalBtn').innerText=t.closeModal;

    if(currentLang==='ar'){ document.body.classList.add('text-rtl'); document.body.classList.remove('text-ltr'); } 
    else { document.body.classList.add('text-ltr'); document.body.classList.remove('text-rtl'); }

    if(ruqyahActive) renderRuqyahDuas(); 
    if(favoritesActive) renderFavorites(); 
    updateGlobalFavIcon(); updateColorTooltips();
}

function saveFavorites(){ localStorage.setItem('dua_favorites', JSON.stringify(favoritesList)); }
function isFavorited(sub,idx){ return favoritesList.some(f=>f.sub===sub && f.idx===idx); }

function addFavorite(sub,idx,dua){ 
    if(!isFavorited(sub,idx)){ 
        favoritesList.push({sub,idx,ar:dua.ar,en:dua.en,translit:dua.translit}); saveFavorites(); 
        if(ruqyahActive) renderRuqyahDuas(); if(favoritesActive) renderFavorites(); 
    } 
}

function removeFavorite(sub,idx){ 
    favoritesList=favoritesList.filter(f=>!(f.sub===sub && f.idx===idx)); saveFavorites(); 
    if(ruqyahActive) renderRuqyahDuas(); if(favoritesActive) renderFavorites(); 
}

function getHeartStrokeColor(){ return isDarkMode ? 'white' : '#333333'; }

function renderRuqyahDuas(){ 
    const data = currentRuqyahSub==='self'?ruqyahSelf:ruqyahOther; 
    const container=document.getElementById('duaListContainer'); 
    container.innerHTML=''; 

    data.forEach((dua,idx)=>{ 
        const card=document.createElement('div'); card.className='dua-card';
        if(idx === selectedDuaIndex) card.classList.add('selected');

        const header=document.createElement('div'); header.className='dua-header'; 
        const num=document.createElement('div'); num.className='dua-number'; num.innerText=(idx+1)+'.'; 

        const fav=isFavorited(currentRuqyahSub,idx); 
        const favBtn=document.createElement('button'); favBtn.className='fav-btn-small'; 
        const strokeColor=getHeartStrokeColor(); 
        favBtn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${fav?'#ff4444':'none'}" stroke="${fav?'#ff4444':strokeColor}" stroke-width="1.5"/></svg>`; 
        favBtn.onclick=(e)=>{ e.stopPropagation(); if(fav) removeFavorite(currentRuqyahSub,idx); else addFavorite(currentRuqyahSub,idx,dua); playClickSound(); }; 

        header.append(num, favBtn); 
        const arabic=document.createElement('div'); arabic.className='dua-arabic'; arabic.innerText=dua.ar; 
        const trans=document.createElement('div'); trans.className='dua-translation'; trans.innerText=dua.en; 
        const tl=document.createElement('div'); tl.className='dua-transliteration'; tl.innerText=dua.translit; 

        if(currentLang==='ar'){ arabic.classList.add('dua-main-lang'); trans.classList.add('dua-secondary-lang'); } 
        else { trans.classList.add('dua-main-lang'); arabic.classList.add('dua-secondary-lang'); } 

        card.append(header); 
        if(currentLang==='ar'){ card.append(arabic, trans); } else { card.append(trans, arabic); }
        if(showTranslit) card.appendChild(tl); 

        card.addEventListener('click',()=>{ 
            document.querySelectorAll('.dua-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected'); selectedDuaIndex = idx;
            showDuaModal(dua); playClickSound(); 
        }); 
        container.appendChild(card); 
    });
    updateMenuFavButton();
}

function showDuaModal(dua) {
    const modal = document.getElementById('duaModal'); const output = document.getElementById('duaOutput');
    let content = '';
    if(currentLang === 'ar') { content = `<div style="font-weight:700; color:${isDarkMode ? 'var(--accent)' : '#1a1a1a'}; margin-bottom:15px;">${dua.ar}</div><div style="color:var(--text-dim); margin-bottom:10px;">${dua.en}</div>`; } 
    else { content = `<div style="font-weight:700; color:${isDarkMode ? 'var(--accent)' : '#1a1a1a'}; margin-bottom:15px;">${dua.en}</div><div style="color:var(--text-dim); margin-bottom:10px; font-family:'Amiri',serif;">${dua.ar}</div>`; }
    if(showTranslit) content += `<div style="color:var(--text-dim); font-style:italic; border-top:1px dashed var(--border-color); padding-top:10px; margin-top:10px;">${dua.translit}</div>`;
    output.innerHTML = content; modal.style.display = 'flex';
}

function renderFavorites(){ 
    const container=document.getElementById('favoritesListContainer'); container.innerHTML=''; 
    if(favoritesList.length===0){ 
        const empty=document.createElement('div'); empty.className='empty-fav'; empty.innerText=translations[currentLang].noFavorites; container.appendChild(empty); return; 
    } 
    favoritesList.forEach((fav,idx)=>{ 
        const card=document.createElement('div'); card.className='dua-card'; 
        const header=document.createElement('div'); header.className='dua-header'; 
        const num=document.createElement('div'); num.className='dua-number'; num.innerText=(idx+1)+'.'; 
        const favBtn=document.createElement('button'); favBtn.className='fav-btn-small'; 
        favBtn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4444" stroke="#ff4444" stroke-width="0"/></svg>`; 
        favBtn.onclick=(e)=>{ e.stopPropagation(); removeFavorite(fav.sub,fav.idx); playClickSound(); }; 
        header.append(num, favBtn); 
        const arabic=document.createElement('div'); arabic.className='dua-arabic'; arabic.innerText=fav.ar; 
        const trans=document.createElement('div'); trans.className='dua-translation'; trans.innerText=fav.en; 
        const tl=document.createElement('div'); tl.className='dua-transliteration'; tl.innerText=fav.translit; 
        if(currentLang==='ar'){ arabic.classList.add('dua-main-lang'); trans.classList.add('dua-secondary-lang'); } 
        else { trans.classList.add('dua-main-lang'); arabic.classList.add('dua-secondary-lang'); } 
        card.append(header); 
        if(currentLang==='ar'){ card.append(arabic, trans); } else { card.append(trans, arabic); }
        if(showTranslit) card.appendChild(tl); 
        card.addEventListener('click',()=>{ showDuaModal(fav); playClickSound(); }); 
        container.appendChild(card); 
    });
    updateMenuFavButton();
}

// ==================== [FIXED SUBCATEGORY HIGHLIGHT LOGIC] ====================
function showRuqyah(){ 
    ruqyahActive=true; favoritesActive=false; selectedDuaIndex = -1;
    document.getElementById('gridContainer').style.display='none'; 
    document.getElementById('messageContainer').style.display='none'; 
    document.getElementById('ruqyahView').style.display='flex'; 
    document.getElementById('favoritesView').style.display='none'; 
    
    // Explicitly set active class when opening
    document.querySelectorAll('.subcategory-btn').forEach(btn => {
        if(btn.getAttribute('data-sub') === currentRuqyahSub) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    renderRuqyahDuas(); 
}

document.querySelectorAll('.subcategory-btn').forEach(btn => {
    btn.addEventListener('click', () => { 
        currentRuqyahSub = btn.getAttribute('data-sub'); 
        selectedDuaIndex = -1;
        // Clean all then set current
        document.querySelectorAll('.subcategory-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
        renderRuqyahDuas(); playClickSound(); 
    });
});
// =============================================================================

function showFavorites(){ 
    favoritesActive=true; ruqyahActive=false; selectedDuaIndex = -1;
    document.getElementById('gridContainer').style.display='none'; 
    document.getElementById('messageContainer').style.display='none'; 
    document.getElementById('ruqyahView').style.display='none'; 
    document.getElementById('favoritesView').style.display='flex'; 
    renderFavorites(); 
}

function exitSubview(){ 
    ruqyahActive=false; favoritesActive=false; selectedDuaIndex = -1;
    document.getElementById('gridContainer').style.display='grid'; 
    document.getElementById('messageContainer').style.display='block'; 
    document.getElementById('ruqyahView').style.display='none'; 
    document.getElementById('favoritesView').style.display='none'; 
}

document.querySelector('.grid-item[data-category="ruqya"]')?.addEventListener('click',()=>{ showRuqyah(); playClickSound(); });
document.querySelector('.grid-item[data-category="favorites"]')?.addEventListener('click',()=>{ showFavorites(); playClickSound(); });
document.getElementById('backFromRuqyah')?.addEventListener('click',()=>{ exitSubview(); playClickSound(); });
document.getElementById('backFromFavorites')?.addEventListener('click',()=>{ exitSubview(); playClickSound(); });

const duasList=["اللهم إني أسألك علماً نافعاً...","يا حي يا قيوم...","اللهم إنك عفو...","ربنا آتنا...","اللهم صل وسلم..."];
document.getElementById('dailyMessageCard')?.addEventListener('click',()=>{ 
    if(!ruqyahActive&&!favoritesActive){ 
        document.getElementById('duaOutput').innerText=duasList[new Date().getHours()%duasList.length]; 
        document.getElementById('duaModal').style.display='flex'; playClickSound(); playVibration(); 
    } 
});
document.getElementById('closeModalBtn')?.addEventListener('click',()=>document.getElementById('duaModal').style.display='none');

document.getElementById('btnGrid')?.addEventListener('click',()=>{ 
    const grid = document.getElementById('gridContainer');
    grid.classList.toggle('grid-3cols'); playClickSound(); 
});

document.getElementById('langToggleBtn')?.addEventListener('click',()=>{ 
    currentLang=currentLang==='ar'?'en':'ar'; applyLanguage(); playClickSound(); 
});

const menuToggle=document.getElementById('menuToggleBtn'), unifiedMenu=document.getElementById('unifiedMenu'); 
menuToggle?.addEventListener('click',(e)=>{ e.stopPropagation(); unifiedMenu.classList.toggle('show'); playClickSound(); }); 
document.addEventListener('click',(e)=>{ if(menuToggle&&!menuToggle.contains(e.target)&&unifiedMenu&&!unifiedMenu.contains(e.target)) unifiedMenu.classList.remove('show'); });

function updateFullTheme(){ 
    document.documentElement.style.setProperty('--accent', currentAccent); 
    document.documentElement.style.setProperty('--header-bg', currentAccent); 
    isDarkMode?document.body.classList.add('dark-mode'):document.body.classList.remove('dark-mode'); 
    localStorage.setItem('dua_accent',currentAccent); localStorage.setItem('dua_darkMode',isDarkMode); 
    if(ruqyahActive) renderRuqyahDuas(); if(favoritesActive) renderFavorites(); updateGlobalFavIcon(); 
}

function setAccent(color,element){ 
    currentAccent=color; updateFullTheme(); 
    document.querySelectorAll('.color-dot').forEach(dot=>dot.classList.remove('active')); 
    if(element) element.classList.add('active'); 
}

document.getElementById('themeToggle')?.addEventListener('change',()=>{ isDarkMode=!isDarkMode; updateFullTheme(); });

const colorArray = [
    {acc:'#cc0000', nAr:'أحمر', nEn:'Red'}, {acc:'#800080', nAr:'بنفسجي', nEn:'Purple'}, {acc:'#0066cc', nAr:'أزرق', nEn:'Blue'}, {acc:'#8B4513', nAr:'بني', nEn:'Brown'},
    {acc:'#ffcc00', nAr:'أصفر', nEn:'Yellow'}, {acc:'#444444', nAr:'أسود', nEn:'Black'}, {acc:'#808080', nAr:'رمادي', nEn:'Gray'}, {acc:'#334155', nAr:'سحابي داكن', nEn:'Midnight Slate'},
    {acc:'#ff66b2', nAr:'وردي', nEn:'Pink'}, {acc:'#228b22', nAr:'أخضر', nEn:'Green'}, {acc:'#ff8c00', nAr:'برتقالي', nEn:'Orange'}, {acc:'#008080', nAr:'تركوازي', nEn:'Teal'}
]; 
const colorMenuDiv=document.getElementById('colorMenu'); 
colorArray.forEach(c=>{ 
    const dot=document.createElement('div'); dot.className='color-dot'; dot.style.backgroundColor=c.acc; dot.setAttribute('data-ar', c.nAr); dot.setAttribute('data-en', c.nEn); 
    dot.onclick=()=>{ setAccent(c.acc,dot); playClickSound(); }; colorMenuDiv.appendChild(dot); 
});

function updateColorTooltips() { document.querySelectorAll('.color-dot').forEach(dot => { dot.title = currentLang === 'ar' ? dot.getAttribute('data-ar') : dot.getAttribute('data-en'); }); }

const fontSlider=document.getElementById('fontSlider'); 
function setDuaFontSize(val){ document.documentElement.style.setProperty('--dua-font-size',val+'px'); localStorage.setItem('dua_font_size',val); } 
fontSlider?.addEventListener('input',(e)=>setDuaFontSize(e.target.value)); 

document.getElementById('chkTranslit')?.addEventListener('change',(e)=>{ showTranslit=e.target.checked; if(ruqyahActive) renderRuqyahDuas(); if(favoritesActive) renderFavorites(); });

document.getElementById('btnCopy')?.addEventListener('click',()=>{ 
    let textToCopy = '';
    if(ruqyahActive && selectedDuaIndex >= 0) { const data = currentRuqyahSub==='self'?ruqyahSelf:ruqyahOther; textToCopy = currentLang==='ar' ? data[selectedDuaIndex].ar : data[selectedDuaIndex].en; }
    if(textToCopy) navigator.clipboard.writeText(textToCopy).then(() => { const btn = document.getElementById('btnCopy'); const original = btn.innerHTML; btn.innerHTML = '✅'; setTimeout(() => btn.innerHTML = original, 2000); });
    playClickSound(); 
});

document.getElementById('btnShare')?.addEventListener('click',()=>{ toggleSharePopup(); playClickSound(); });
document.getElementById('btnRefresh')?.addEventListener('click',()=>location.reload());

function updateGlobalFavIcon(){ 
    const svgPath=document.querySelector('#favSvgIcon path'); if(svgPath) svgPath.setAttribute('stroke','white'); 
}

function updateMenuFavButton() {
    const btn = document.getElementById('btnFav'); const svg = document.getElementById('favSvgIcon');
}

function toggleSharePopup() {
    const pop = document.getElementById('sharePopup'); pop.classList.toggle('show');
    if (pop.classList.contains('show')) buildShareGrid();
}

function buildShareGrid() {
    let text = 'Dua';
    const grid = document.getElementById('shareGrid'); grid.innerHTML = ''; 
    const pn = { ar: { whatsapp: "واتساب", copy: "نسخ" }, en: { whatsapp: "WhatsApp", copy: "Copy" } }[currentLang];
    const platforms = [ { name: pn.whatsapp, url: `https://wa.me/?text=Dua` }, { name: pn.copy, action: () => navigator.clipboard.writeText(window.location.href) } ];
    platforms.forEach(p => {
        const div = document.createElement('div'); div.className = 'share-icon'; div.innerHTML = `<span>${p.name}</span>`;
        div.onclick = () => { if (p.url) window.open(p.url, '_blank'); else p.action(); document.getElementById('sharePopup').classList.remove('show'); };
        grid.appendChild(div);
    });
}

function changeIcon() {
    currentIconIdx = (currentIconIdx + 1) % 5;
    document.getElementById('cycleIcon').src = ["https://cdn-icons-png.flaticon.com/128/4354/4354959.png","https://cdn-icons-png.flaticon.com/128/7321/7321058.png","https://cdn-icons-png.flaticon.com/128/3004/3004949.png","https://cdn-icons-png.flaticon.com/128/6152/6152858.png","https://cdn-icons-png.flaticon.com/128/13773/13773984.png"][currentIconIdx];
}

window.onload = () => {
    const savedAccent=localStorage.getItem('dua_accent'), savedDark=localStorage.getItem('dua_darkMode'); 
    if(savedAccent) currentAccent=savedAccent; if(savedDark!==null) isDarkMode=savedDark==='true'; updateFullTheme();
    applyLanguage(); 
};
</script>
