<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الدعاء · الرقية الشرعية · الأذكار</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #cc0000;
            --accent-soft: rgba(204,0,0,0.15);
            --widget-bg: #ffffff;
            --header-bg: #cc0000;
            --text: #1a1a1a;
            --text-dim: #666666;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --popup-bg: #ffffff;
            --popup-border: #ddd;
            --shadow: 0 8px 20px rgba(0,0,0,0.05);
            --dua-font-size: 22px;
            --envelope-flap: #d0d0d0;
            --heart-stroke-light: #333333;
            --heart-stroke-dark: #ffffff;
            --source-bg: #f2f2f2;
        }

        body.dark-mode {
            --widget-bg: #1e1e2f;
            --header-bg: #2d2d44;
            --text: #ffffff;
            --text-dim: #aaaaaa;
            --card-bg: #2a2a3a;
            --border-color: #3a3a4a;
            --popup-bg: #2a2a3a;
            --popup-border: #444;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
            --envelope-flap: #555555;
            --source-bg: #36364a;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease;
            font-family: 'Tajawal', 'Inter', sans-serif;
        }

        .dua-translation, .message-card p, .message-card .sub-title, .grid-item span, .menu-section-title span:last-child, .setting-label span:last-child, .setting-row, .share-popup-title, .empty-fav {
            font-family: 'Inter', sans-serif;
        }
        .dua-arabic, .dua-transliteration, .message-card h2, .message-card .open-link, .dua-number, .subcategory-btn, .back-button, .tab span, .tab label {
            font-family: 'Amiri', 'Tajawal', serif;
        }
        body.dark-mode { background-color: #12121a; }

        body.text-rtl .message-card, body.text-rtl .dua-card { direction: rtl; text-align: right; }
        body.text-ltr .message-card, body.text-ltr .dua-card { direction: ltr; text-align: left; }

        body.text-rtl .menu-popover .menu-section-title { text-align: left; justify-content: flex-start; direction: ltr; }
        body.text-ltr .menu-popover .menu-section-title { text-align: left; justify-content: flex-start; }

        .grid-item { text-align: center !important; }
        .message-card { text-align: center !important; }

        body.text-rtl .dua-header { flex-direction: row-reverse; }
        body.text-ltr .dua-header { flex-direction: row; }

        body:not(.dark-mode) .fav-btn-small svg path { stroke: var(--heart-stroke-light) !important; }
        body.dark-mode .fav-btn-small svg path { stroke: var(--heart-stroke-dark) !important; }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--widget-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        header {
            background-color: var(--header-bg);
            padding: 14px 18px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            direction: ltr !important;
        }
        .header-icons {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-left: auto;
            flex-direction: row;
            direction: ltr !important;
        }
        .icon-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .icon-btn img { width: auto; height: auto; max-width: 24px; max-height: 24px; filter: invert(1); display: block; }
        .lang-btn img { max-width: 28px; max-height: 28px; }
        .menu-icon span { font-size: 26px; font-weight: bold; color: white; line-height: 1; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .floating-icon {
            width: 50px;
            height: 50px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.2s;
        }
        .floating-icon:hover {
            transform: scale(1.1);
        }
        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .message-container { padding: 25px 20px; perspective: 1000px; }
        .message-card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 60px 20px 35px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            animation: mailSwing 1.2s ease-out forwards;
        }
        .message-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: var(--envelope-flap);
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 2;
        }
        @keyframes mailSwing {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(12deg); }
            30% { transform: rotate(-10deg); }
            45% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            75% { transform: rotate(3deg); }
            90% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }
        .message-card h2 { font-size: 1.6rem; margin-bottom: 4px; color: var(--text); font-weight: 800; }
        .message-card .sub-title { color: var(--text-dim); font-size: 1rem; margin-bottom: 15px; }
        .message-card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6; }
        .message-card .open-link { color: var(--accent); font-weight: 800; font-size: 1.1rem; text-decoration: none; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 20px 40px 20px;
            direction: ltr !important;
        }
        .grid-container.grid-3cols { grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .grid-item {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 24px 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            box-shadow: var(--shadow);
            color: var(--text);
        }
        .grid-item:active { transform: scale(0.96); }
        .grid-item.active {
            background: var(--accent) !important;
            border: none;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            transform: scale(1.02);
        }
        .grid-item.active span { color: white; }
        .grid-item.active img { filter: none !important; }
        .grid-item img { width: 70px; height: 70px; margin-bottom: 12px; object-fit: contain; }
        .grid-item span { font-weight: 700; font-size: 1rem; color: var(--text); }

        .ruqyah-view, .favorites-view {
            display: none;
            flex-direction: column;
            padding: 0 20px 20px 20px;
        }
        .subcategory-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0 15px 0;
        }
        .subcategory-btn {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text);
            transition: 0.2s;
        }
        .subcategory-btn.active { background: var(--accent); color: white; }
        .back-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }
        .dua-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .dua-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border-left: 4px solid var(--accent);
            box-shadow: var(--shadow);
            transition: 0.2s;
            position: relative;
        }
        .dua-card.selected {
            background: var(--accent-soft);
            transform: scale(0.98);
            transition: 0.1s;
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 12px rgba(204,0,0,0.2);
        }
        .dua-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .dua-number {
            font-weight: bold;
            color: var(--accent);
            font-size: 0.9rem;
        }
        .fav-btn-small {
            background: none;
            border: none;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .fav-btn-small:hover { transform: scale(1.15); }
        .fav-btn-small svg { width: 22px; height: 22px; }

        .fav-btn-small svg path[fill="#ff4444"] { fill: #ff4444 !important; }

        .dua-arabic { 
            font-size: var(--dua-font-size); 
            font-family: 'Amiri', serif; 
            line-height: 1.6; 
            margin-bottom: 8px; 
            transition: all 0.3s ease;
        }
        .dua-translation { 
            font-size: calc(var(--dua-font-size) * 0.75); 
            margin-bottom: 6px; 
            line-height: 1.5;
            transition: all 0.3s ease;
        }
        .dua-transliteration { 
            font-size: calc(var(--dua-font-size) * 0.7); 
            font-style: italic; 
            border-top: 1px dashed var(--border-color); 
            padding-top: 6px; 
            margin-top: 4px; 
            transition: all 0.3s ease;
        }

        .dua-source-box {
            background: var(--source-bg);
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-dim);
            line-height: 1.4;
            display: none;
            border-right: 3px solid #999;
        }

        .dua-main-lang { font-weight: 700; }
        .dua-secondary-lang { font-weight: 400; color: var(--text-dim) !important; }

        body:not(.dark-mode) .dua-main-lang { color: #1a1a1a !important; }
        body:not(.dark-mode) .dua-secondary-lang { color: #666666 !important; }

        body.dark-mode .dua-main-lang { color: var(--accent) !important; }
        body.dark-mode .dua-secondary-lang { color: var(--text-dim) !important; }

        .menu-popover {
            position: fixed; 
            top: 70px; 
            right: 18px; 
            background: var(--popup-bg); 
            padding: 18px;
            border-radius: 20px; 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.15s; 
            z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            border: 1px solid var(--popup-border); 
            width: 290px; 
            direction: ltr;
        }
        .menu-popover.show { visibility: visible; opacity: 1; }
        .menu-header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
        }
        .menu-section-title { 
            color: var(--text); 
            font-size: 14px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            text-align: left;
            justify-content: flex-start;
        }
        .theme-toggle { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(128,128,128,0.15); 
            border-radius: 30px; 
            padding: 4px; 
        }
        .theme-toggle-icon { 
            font-size: 18px; 
            width: 28px; 
            text-align: center; 
            cursor: pointer; 
            opacity: 0.6; 
            color: var(--text); 
        }
        .theme-toggle-icon.active { opacity: 1; filter: drop-shadow(0 0 2px var(--accent)); }
        .theme-switch { 
            position: relative; 
            display: inline-block; 
            width: 52px; 
            height: 26px; 
        }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-color: #ccc; 
            transition: 0.2s; 
            border-radius: 26px; 
        }
        .theme-slider:before { 
            position: absolute; 
            content: ""; 
            height: 22px; 
            width: 22px; 
            left: 2px; 
            bottom: 2px; 
            background-color: white; 
            transition: 0.2s; 
            border-radius: 50%; 
        }
        input:checked + .theme-slider { background-color: var(--accent); }
        input:checked + .theme-slider:before { transform: translateX(26px); }
        .menu-divider { 
            height: 1px; 
            background: var(--text-dim); 
            margin: 12px 0; 
            border: none; 
            opacity: 0.3; 
        }
        .color-menu { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .color-dot { 
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid transparent; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.1s; 
        }
        .color-dot.active { border-color: var(--text); transform: scale(1.08); }
        .color-dot.active::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .settings-rows { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .setting-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: var(--text); 
            font-size: 13px; 
            font-weight: 600; 
        }
        .setting-label { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .font-slider { 
            width: 100px; 
            accent-color: var(--accent); 
            cursor: pointer; 
        }
        .action-btns { 
            display: flex; 
            gap: 10px; 
            margin-top: 10px; 
            padding-top: 10px; 
            border-top: 1px solid var(--text-dim); 
        }
        .action-btn { 
            flex: 1; 
            height: 42px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            background: var(--accent); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
            position: relative; 
        }
        .action-btn svg { width: 20px; height: 20px; fill: white; }
        .action-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .action-btn::after { 
            content: attr(data-tooltip); 
            position: absolute; 
            bottom: 50px; 
            background: #333; 
            color: white; 
            font-size: 11px; 
            padding: 4px 10px; 
            border-radius: 6px; 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.15s; 
            white-space: nowrap; 
            pointer-events: none; 
        }
        .action-btn:hover::after { visibility: visible; opacity: 1; }
        .switch { 
            position: relative; 
            display: inline-block; 
            width: 44px; 
            height: 24px; 
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-color: #555; 
            transition: .15s; 
            border-radius: 24px; 
        }
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 18px; 
            width: 18px; 
            left: 3px; 
            bottom: 3px; 
            background-color: #ddd; 
            transition: .15s; 
            border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        .share-popup {
            position: fixed; 
            bottom: 100px; 
            right: 20px; 
            background: var(--popup-bg); 
            border-radius: 28px;
            padding: 20px; 
            width: 300px; 
            z-index: 1100; 
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid var(--accent); 
            visibility: hidden; 
            opacity: 0; 
            transition: 0.15s ease; 
            transform: scale(0.95);
        }
        .share-popup.show { 
            visibility: visible; 
            opacity: 1; 
            transform: scale(1); 
        }
        .share-popup-title { 
            text-align: center; 
            font-weight: 700; 
            font-size: 18px; 
            margin-bottom: 18px; 
            color: var(--accent); 
        }
        .share-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 18px;
            justify-items: center;
        }
        .share-icon {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px;
            cursor: pointer; 
            color: var(--accent); 
            font-size: 12px; 
            font-weight: 500;
            transition: transform 0.1s ease;
        }
        .share-icon:hover { transform: scale(1.05); }
        .share-icon svg {
            width: 48px; 
            height: 48px;
            background: rgba(128,128,128,0.2); 
            border-radius: 30px;
            padding: 10px;
            transition: background 0.2s;
            stroke: var(--accent);
        }
        .share-icon:hover svg { background: rgba(128,128,128,0.4); }

        #duaModal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); 
            z-index: 1000;
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .modal-content { 
            background: var(--card-bg); 
            padding: 40px 25px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            color: var(--text); 
            max-height: 85vh;
            overflow-y: auto;
        }
        .dua-text { 
            font-size: var(--dua-font-size); 
            line-height: 1.8; 
            margin-bottom: 30px; 
            font-family: 'Amiri', serif; 
        }
        .close-modal { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .empty-fav { 
            opacity: 0.8; 
            font-style: italic; 
            text-align: center; 
            padding: 30px; 
            color: var(--text-dim); 
        }

        @media (max-width: 480px) {
            .grid-container.grid-3cols { grid-template-columns: repeat(2, 1fr); }
            .grid-item span { font-size: 0.85rem; }
        }
    </style>
<base target="_blank">

<body class="text-rtl">
<div class="app-container">
    <header>
        <div class="header-icons" style="width:100%; justify-content:space-between; align-items:center;">
            <button class="icon-btn lang-btn" id="langToggleBtn"><img src="https://cdn-icons-png.flaticon.com/128/4570/4570372.png" alt="language"></button>
            <div class="header-center" style="position:absolute; left:50%; transform:translateX(-50%);">
                <img id="cycleIcon" class="floating-icon" src="https://cdn-icons-png.flaticon.com/128/13773/13773984.png" onclick="changeIcon()" alt="Icon">
            </div>
            <button class="icon-btn menu-icon" id="menuToggleBtn"><span>☰</span></button>
        </div>
    </header>

    <div class="message-container" id="messageContainer">
        <div class="message-card" id="dailyMessageCard">
            <h2 id="msgTitle">رسالتك اليوم</h2>
            <div class="sub-title" id="msgSub">رسالتك اليوم</div>
            <p id="msgText">قد يكون وراء هذا الدعاء رسالة كُتبت لك وأنت اليوم أشد ما تحتاجها</p>
            <div class="open-link" id="msgLink">اضغط هنا لتفتحها</div>
        </div>
    </div>

    <div class="grid-container" id="gridContainer">
        <div class="grid-item" data-category="ruqya"><img src="https://cdn-icons-png.flaticon.com/128/7246/7246452.png" alt="ruqya"><span id="labelRuqya">الرقية الشرعية</span></div>
        <div class="grid-item" data-category="sunnah"><img src="https://cdn-icons-png.flaticon.com/128/4447/4447135.png" alt="sunnah"><span id="labelSunnah">دعاء من السنة</span></div>
        <div class="grid-item" data-category="wird"><img src="https://cdn-icons-png.flaticon.com/128/17185/17185688.png" alt="wird"><span id="labelWird">ورد الدعاء</span></div>
        <div class="grid-item" data-category="quranic"><img src="https://cdn-icons-png.flaticon.com/128/5228/5228125.png" alt="quran"><span id="labelQuranic">دعاء من القرآن</span></div>
        <div class="grid-item" data-category="personal"><img src="https://cdn-icons-png.flaticon.com/128/14900/14900883.png" alt="personal"><span id="labelPersonal">أدعيتي</span></div>
        <div class="grid-item" data-category="favorites"><img src="https://cdn-icons-png.flaticon.com/128/17003/17003566.png" alt="favorites"><span id="labelFavorites">المفضلة</span></div>
    </div>

    <div class="ruqyah-view" id="ruqyahView">
        <div class="subcategory-buttons" id="ruqyahSubs">
            <button class="subcategory-btn active" data-sub="self" id="selfBtn">ارق نفسك</button>
            <button class="subcategory-btn" data-sub="other" id="otherBtn">ارق غيرك</button>
        </div>
        <button class="back-button" id="backFromRuqyah"><span>←</span> <span id="backText">رجوع</span></button>
        <div class="dua-list-container" id="duaListContainer"></div>

// ==================== LOGIC ====================
let currentLang='ar', isDarkMode=false, currentAccent='#cc0000', audioCtx=null, showTranslit=true, showSource=true,
    activeCategory='ruqya', currentRuqyahSub='self', selectedDuaIndex=-1;
let favoritesList = JSON.parse(localStorage.getItem('dua_favorites') || '[]');

function playClickSound(){ 
    const chk=document.getElementById('chkClick'); 
    if(!chk||!chk.checked) return; 
    try{ 
        if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); 
        const now=audioCtx.currentTime,osc=audioCtx.createOscillator(),gain=audioCtx.createGain(); 
        osc.connect(gain); gain.connect(audioCtx.destination); 
        osc.frequency.value=800; 
        gain.gain.setValueAtTime(0.1,now); 
        gain.gain.exponentialRampToValueAtTime(0.00001,now+0.12); 
        osc.start(); osc.stop(now+0.1); 
    }catch(e){} 
}

function playVibration(){ 
    const chk=document.getElementById('chkVibrate'); 
    if(chk&&chk.checked&&navigator.vibrate) navigator.vibrate(60); 
}

function applyLanguage(){ 
    const t=translations[currentLang];
    document.getElementById('msgTitle').innerText=t.msgTitle;
    document.getElementById('msgSub').innerText=t.msgSub;
    document.getElementById('msgText').innerText=t.msgText;
    document.getElementById('msgLink').innerText=t.msgLink;
    document.getElementById('labelRuqya').innerText=t.ruqya;
    document.getElementById('labelWird').innerText=t.wird;
    document.getElementById('labelQuranic').innerText=t.quranic;
    document.getElementById('labelPersonal').innerText=t.personal;
    document.getElementById('labelFavorites').innerText=t.favorites;
    document.getElementById('labelSunnah').innerText=t.sunnah;
    document.getElementById('menuTitleColors').innerText=t.menuColors;
    document.getElementById('menuTitleSettings').innerText=t.menuSettings;
    document.getElementById('set1').innerText=t.set1;
    document.getElementById('set2').innerText=t.set2;
    document.getElementById('set3').innerText=t.set3;
    document.getElementById('set4').innerText=t.set4;
    document.getElementById('setSource').innerText=t.setSource;
    document.getElementById('setTranslit').innerText=t.setTranslit;
    document.getElementById('selfBtn').innerText=t.selfBtn;
    document.getElementById('otherBtn').innerText=t.otherBtn;
    document.getElementById('backText').innerText=t.back;
    document.getElementById('favBackText').innerText=t.back;
    document.getElementById('closeModalBtn').innerText=t.closeModal;

    if(currentLang==='ar'){ document.body.classList.add('text-rtl'); document.body.classList.remove('text-ltr'); } 
    else { document.body.classList.add('text-ltr'); document.body.classList.remove('text-rtl'); }

    renderActiveCategory();
}

function renderActiveCategory(){
    if(activeCategory==='ruqya') renderDuas(currentRuqyahSub==='self'?ruqyahSelf:ruqyahOther, 'ruqyah');
    else if(activeCategory==='sunnah') renderDuas(sunnahDuas, 'sunnah');
    else if(activeCategory==='favorites') renderFavorites();
}

function renderDuas(data, catId){ 
    const container=document.getElementById('duaListContainer'); 
    container.innerHTML=''; 
    data.forEach((dua,idx)=>{ 
        const card=document.createElement('div'); 
        card.className='dua-card'; 
        const header=document.createElement('div'); 
        header.className='dua-header'; 
        const num=document.createElement('div'); 
        num.className='dua-number'; 
        num.innerText=(idx+1)+'.'; 

        const fav=favoritesList.some(f=>f.ar===dua.ar); 
        const favBtn=document.createElement('button'); 
        favBtn.className='fav-btn-small'; 
        const strokeColor=isDarkMode?'white':'#333';
        favBtn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${fav?'#ff4444':'none'}" stroke="${fav?'#ff4444':strokeColor}" stroke-width="1.5"/></svg>`; 
        favBtn.onclick=(e)=>{ 
            e.stopPropagation(); 
            if(fav) favoritesList=favoritesList.filter(f=>f.ar!==dua.ar);
            else favoritesList.push(dua);
            localStorage.setItem('dua_favorites', JSON.stringify(favoritesList));
            renderActiveCategory();
            playClickSound(); 
        }; 
        header.append(num, favBtn); 

        const arabic=document.createElement('div'); arabic.className='dua-arabic'; arabic.innerText=dua.ar; 
        const trans=document.createElement('div'); trans.className='dua-translation'; trans.innerText=dua.en; 
        const tl=document.createElement('div'); tl.className='dua-transliteration'; tl.innerText=dua.translit; 

        if(currentLang==='ar'){ arabic.classList.add('dua-main-lang'); trans.classList.add('dua-secondary-lang'); } 
        else { trans.classList.add('dua-main-lang'); arabic.classList.add('dua-secondary-lang'); } 

        card.append(header); 
        if(currentLang==='ar'){ card.append(arabic, trans); } else { card.append(trans, arabic); }
        if(showTranslit) card.appendChild(tl); 

        // Source Box
        const sBox = document.createElement('div');
        sBox.className = 'dua-source-box';
        let sContent = `<strong>Source:</strong> ${dua.source || 'Sunnah'}`;
        if(dua.tafsir) sContent += `<br><strong>Tafsir:</strong> ${dua.tafsir}`;
        if(dua.method) sContent += `<br><strong>Method:</strong> ${dua.method}`;
        if(dua.note) sContent += `<br><strong>Note:</strong> ${dua.note}`;
        sBox.innerHTML = sContent;
        if(showSource) sBox.style.display = 'block';
        card.appendChild(sBox);

        card.addEventListener('click',()=>{ 
            showDuaModal(dua);
            playClickSound(); 
        }); 
        container.appendChild(card); 
    });
}

function renderFavorites(){ 
    const container=document.getElementById('favoritesListContainer'); 
    container.innerHTML=''; 
    if(favoritesList.length===0){ 
        const empty=document.createElement('div'); empty.className='empty-fav'; empty.innerText=translations[currentLang].noFavorites;
        container.appendChild(empty); return; 
    } 
    favoritesList.forEach((dua,idx)=>{ 
        const card=document.createElement('div'); card.className='dua-card'; 
        const header=document.createElement('div'); header.className='dua-header'; 
        const num=document.createElement('div'); num.className='dua-number'; num.innerText=(idx+1)+'.'; 
        const favBtn=document.createElement('button'); favBtn.className='fav-btn-small'; 
        favBtn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4444" stroke="#ff4444" stroke-width="0"/></svg>`; 
        favBtn.onclick=(e)=>{ 
            e.stopPropagation(); 
            favoritesList=favoritesList.filter(f=>f.ar!==dua.ar);
            localStorage.setItem('dua_favorites', JSON.stringify(favoritesList));
            renderFavorites();
            playClickSound(); 
        }; 
        header.append(num, favBtn); 
        const arabic=document.createElement('div'); arabic.className='dua-arabic'; arabic.innerText=dua.ar; 
        const trans=document.createElement('div'); trans.className='dua-translation'; trans.innerText=dua.en; 
        if(currentLang==='ar'){ arabic.classList.add('dua-main-lang'); trans.classList.add('dua-secondary-lang'); card.append(header, arabic, trans); } 
        else { trans.classList.add('dua-main-lang'); arabic.classList.add('dua-secondary-lang'); card.append(header, trans, arabic); }
        if(showTranslit){ const tl=document.createElement('div'); tl.className='dua-transliteration'; tl.innerText=dua.translit; card.appendChild(tl); }
        card.onclick=()=>showDuaModal(dua);
        container.appendChild(card); 
    });
}

function showDuaModal(dua) {
    const modal = document.getElementById('duaModal');
    const output = document.getElementById('duaOutput');
    let content = `<div style="font-weight:700; color:var(--accent); margin-bottom:15px;">${dua.ar}</div>`;
    content += `<div style="color:var(--text); margin-bottom:10px;">${dua.en}</div>`;
    if(showTranslit) content += `<div style="color:var(--text-dim); font-style:italic; border-top:1px dashed var(--border-color); padding-top:10px; margin-top:10px;">${dua.translit}</div>`;
    
    if(showSource){
        content += `<div class="dua-source-box" style="display:block; text-align:left; font-size:0.8rem;">`;
        content += `<strong>Source:</strong> ${dua.source || 'Sunnah'}`;
        if(dua.tafsir) content += `<br><strong>Tafsir:</strong> ${dua.tafsir}`;
        if(dua.method) content += `<br><strong>Method:</strong> ${dua.method}`;
        if(dua.note) content += `<br><strong>Note:</strong> ${dua.note}`;
        content += `</div>`;
    }

    output.innerHTML = content;
    modal.style.display = 'flex';
}

function showCategory(cat){ 
    activeCategory=cat; 
    document.getElementById('gridContainer').style.display='none'; 
    document.getElementById('messageContainer').style.display='none'; 
    if(cat==='favorites'){ document.getElementById('favoritesView').style.display='flex'; renderFavorites(); }
    else { 
        document.getElementById('ruqyahView').style.display='flex'; 
        document.getElementById('ruqyahSubs').style.display = (cat==='ruqya'?'flex':'none');
        renderActiveCategory(); 
    }
}

function exitSubview(){ 
    document.getElementById('gridContainer').style.display='grid'; 
    document.getElementById('messageContainer').style.display='block'; 
    document.getElementById('ruqyahView').style.display='none'; 
    document.getElementById('favoritesView').style.display='none'; 
}

// Events
document.querySelectorAll('.grid-item').forEach(item=>{
    item.onclick=()=>{ showCategory(item.getAttribute('data-category')); playClickSound(); };
});

document.querySelectorAll('.subcategory-btn').forEach(btn=>{
    btn.onclick=()=>{ 
        currentRuqyahSub=btn.getAttribute('data-sub'); 
        document.querySelectorAll('.subcategory-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); renderActiveCategory(); playClickSound(); 
    };
});

document.getElementById('backFromRuqyah').onclick=exitSubview;
document.getElementById('backFromFavorites').onclick=exitSubview;
document.getElementById('closeModalBtn').onclick=()=>document.getElementById('duaModal').style.display='none';

document.getElementById('chkSource').onchange=(e)=>{ showSource=e.target.checked; renderActiveCategory(); };
document.getElementById('chkTranslit').onchange=(e)=>{ showTranslit=e.target.checked; renderActiveCategory(); };

document.getElementById('langToggleBtn').onclick=()=>{ 
    currentLang=currentLang==='ar'?'en':'ar'; applyLanguage(); playClickSound(); 
};

const menuToggle=document.getElementById('menuToggleBtn'), unifiedMenu=document.getElementById('unifiedMenu'); 
menuToggle.onclick=(e)=>{ e.stopPropagation(); unifiedMenu.classList.toggle('show'); playClickSound(); }; 
document.onclick=(e)=>{ if(!unifiedMenu.contains(e.target)) unifiedMenu.classList.remove('show'); };

// Theme / Color logic
function updateFullTheme(){ 
    document.documentElement.style.setProperty('--accent', currentAccent); 
    document.documentElement.style.setProperty('--header-bg', currentAccent); 
    isDarkMode?document.body.classList.add('dark-mode'):document.body.classList.remove('dark-mode'); 
}
document.getElementById('themeToggle').onchange=(e)=>{ isDarkMode=e.target.checked; updateFullTheme(); };

const colors = ['#cc0000', '#800080', '#0066cc', '#228b22', '#ff8c00', '#444444'];
colors.forEach(c=>{
    const dot=document.createElement('div'); dot.className='color-dot'; dot.style.backgroundColor=c;
    dot.onclick=()=>{ currentAccent=c; updateFullTheme(); playClickSound(); };
    document.getElementById('colorMenu').appendChild(dot);
});

function changeIcon() { playClickSound(); }

applyLanguage();
updateFullTheme();
